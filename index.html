<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L O D — 동대문 새벽시장 전문 사입 서비스</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:#0a0a0a;color:#f0ece4;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;min-height:100%;}
    #root{display:flex;justify-content:center;min-height:100vh;background:#0a0a0a;}
    .shell{width:100%;max-width:600px;min-height:100vh;background:#0a0a0a;position:relative;box-shadow:1px 0 0 rgba(240,236,228,.07),-1px 0 0 rgba(240,236,228,.07);}

    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:rgba(240,236,228,.18);border-radius:2px;}

    @keyframes fadeIn  {from{opacity:0}to{opacity:1}}
    @keyframes pulse   {0%,100%{box-shadow:0 0 0 0 rgba(254,229,0,.55)}60%{box-shadow:0 0 0 18px rgba(254,229,0,0)}}
    @keyframes dotB    {0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
    @keyframes spin    {to{transform:rotate(360deg)}}

    .fade-in{animation:fadeIn .35s ease;}
    .chat-pulse{animation:pulse 2.2s ease-in-out infinite;}
    .chat-pulse:hover{animation-play-state:paused;}
    .float-pulse{animation:pulse 2s ease-in-out infinite;}

    .nav{position:sticky;top:0;z-index:200;width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:68px;background:rgba(10,10,10,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(240,236,228,.08);border-radius:0 0 20px 20px;}

    /* 영상 박스 */
    .vbox-outer{display:flex;justify-content:center;width:100%;}
    .vbox{aspect-ratio:9/16;background:#111;border-radius:22px;overflow:hidden;border:1px solid rgba(240,236,228,.12);position:relative;}
    .vbox video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .vbox-ph{position:absolute;inset:0;background:linear-gradient(160deg,#1d1d1d,#0d0d0d);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}

    /* 업로드 */
    .upload-btn{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(254,229,0,.93);color:#0a0a0a;border:none;border-radius:20px;padding:7px 16px;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap;z-index:3;letter-spacing:.04em;font-family:inherit;}
    .progress-overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:4;border-radius:inherit;}
    .progress-bar-wrap{width:72%;height:6px;background:rgba(255,255,255,.18);border-radius:3px;overflow:hidden;}
    .progress-bar-fill{height:100%;background:#FEE500;border-radius:3px;transition:width .25s;}

    /* 룩북 */
    .lcard{position:relative;padding-top:177.78%;background:#111;border:1px solid rgba(240,236,228,.1);border-radius:18px;overflow:hidden;cursor:pointer;transition:border-color .3s;}
    .lcard:hover{border-color:rgba(240,236,228,.28);}
    .lcard-inner{position:absolute;inset:0;background:#141414;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:background .3s;}
    .lcard:hover .lcard-inner{background:#1c1c1c;}

    /* 지역 버튼 */
    .rbtn{display:flex;align-items:center;justify-content:space-between;width:100%;border:none;border-radius:20px;cursor:pointer;font-family:inherit;transition:transform .2s,filter .2s;padding:26px 28px;background:#FEE500;}
    .rbtn:hover{transform:scale(1.01);filter:brightness(1.06);}

    /* 관리자 편집 */
    .editable{cursor:pointer;position:relative;}
    .editable::after{content:"✏️";position:absolute;top:-20px;left:50%;transform:translateX(-50%);background:#FEE500;color:#0a0a0a;font-size:9px;font-weight:900;padding:2px 8px;border-radius:10px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;}
    .editable:hover::after{opacity:1;}

    /* 편집 모달 */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal-box{background:#1a1a1a;border:1px solid rgba(240,236,228,.18);border-radius:20px;padding:24px;width:100%;max-width:520px;}
    .modal-textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(240,236,228,.2);border-radius:10px;padding:12px 14px;font-size:14px;color:#f0ece4;font-family:inherit;outline:none;resize:vertical;min-height:80px;line-height:1.6;}
    .modal-textarea::placeholder{color:rgba(240,236,228,.3);}

    .steps-row{display:flex;align-items:center;overflow-x:auto;padding-bottom:2px;justify-content:center;}
    .steps-row::-webkit-scrollbar{display:none;}

    textarea::placeholder{color:rgba(240,236,228,.3);}
    textarea{outline:none;}
    input{outline:none;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   🔧 설정값
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CLOUDINARY_CLOUD  = "ddjdyn0yj";
const CLOUDINARY_PRESET = "lod_unsigned";
const APPS_SCRIPT_URL   = "https://script.google.com/macros/s/AKfycbziQ2M5B33SVIRi19e3o9CDKMjhZ0YzDnouiu3Ye02bUaTAQoJ2o1mapPtAsbYWZyBp/exec";
const MAIN_KAKAO        = "https://yongsaib.sosolution.net/login";
const IS_ADMIN          = new URLSearchParams(location.search).get("admin") === "true";

/* 기본값 */
const DEFAULTS = {
  "홈페이지 제목":  "동대문 새벽시장\n전문 사입 서비스",
  "메인 영상 URL":  "",
  "공지사항":       "",
  "강북팀 이름":    "강북·도봉·노원·중랑",
  "강북팀 소개":    "L O D 서울 강북권 대표 베테랑 팀입니다.\n18년의 숙련된 노하우로 단순 사입 이상의 가치를 제공합니다.\n트렌드와 마켓 정보를 함께 공유해 드립니다.",
  "강북팀 카카오":  "https://open.kakao.com/SEOUL_NORTH",
  "강북팀 마감":    "매일 AM 03:00",
  "인천팀 이름":    "인천·부천",
  "인천팀 소개":    "인천·부천 지역 사입의 최고 전문가 팀입니다.\n20년 경력의 완벽한 픽업과 빠른 피드백을 약속드립니다.\n경기권 로드샵 사장님들의 든든한 파트너가 되겠습니다.",
  "인천팀 카카오":  "https://open.kakao.com/INCHEON_BUCHEON",
  "인천팀 마감":    "매일 AM 02:30",
  "룩북1_URL":      "",
  "룩북2_URL":      "",
  "룩북3_URL":      "",
  "룩북4_URL":      "",
  "사입 프로그램":  "https://yongsaib.sosolution.net/login",
};

const STEPS = ["사입 신청","현장 픽업","지역별 분류","안전 배송"];
const LOOKS_INIT = [
  {id:1,label:"EDITORIAL 01",style:"MINIMAL CHIC"},
  {id:2,label:"EDITORIAL 02",style:"OVERFIT STREET"},
  {id:3,label:"EDITORIAL 03",style:"MODERN CLASSIC"},
  {id:4,label:"EDITORIAL 04",style:"URBAN CASUAL"},
];
const SYS = `당신은 동대문 새벽시장 전문 사입 서비스 'L O D'의 24시간 AI 비서입니다. 사입, 동대문 시장, 패션 트렌드에 대해 친절하고 전문적으로 2-4문장, 한국어로만 답변하세요.`;

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   시트 읽기 (JSONP) — 캐시 우선 표시
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CACHE_KEY = "lod_data_cache";

function getCached(){
  try{ const c=localStorage.getItem(CACHE_KEY); return c?JSON.parse(c):null; }catch{ return null; }
}
function setCache(data){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify(data)); }catch{}
}

function loadSheet(callback){
  // 1. 캐시된 데이터 먼저 즉시 표시
  const cached = getCached();
  if(cached) callback({...DEFAULTS,...cached});

  // 2. 시트에서 새 데이터 가져오기
  const name = "cb_" + Date.now();
  const s = document.createElement("script");
  s.src = APPS_SCRIPT_URL + "?callback=" + name + "&t=" + Date.now();
  window[name] = (res)=>{
    delete window[name];
    document.body.removeChild(s);
    if(res && res.status === "ok"){
      const newData = {...DEFAULTS, ...res.data};
      setCache(res.data); // 캐시 저장
      callback(newData);  // 새 데이터로 교체
    }
  };
  s.onerror = ()=>{ delete window[name]; document.body.removeChild(s); if(!cached) callback({...DEFAULTS}); };
  document.body.appendChild(s);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   시트 저장 (JSONP GET)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function saveToSheet(key, value){
  return new Promise(resolve=>{
    const name = "save_" + Date.now();
    const s = document.createElement("script");
    const p = new URLSearchParams({callback:name, action:"update", key, value, t:Date.now()});
    s.src = APPS_SCRIPT_URL + "?" + p.toString();
    window[name] = (res)=>{
      delete window[name];
      if(document.body.contains(s)) document.body.removeChild(s);
      resolve(res);
    };
    s.onerror = ()=>{ delete window[name]; if(document.body.contains(s)) document.body.removeChild(s); resolve(null); };
    setTimeout(()=>{ if(window[name]){ delete window[name]; if(document.body.contains(s)) document.body.removeChild(s); resolve(null); }}, 8000);
    document.body.appendChild(s);
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Cloudinary 업로드
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function uploadFile(file, type, onProgress){
  const max = type==="video" ? 500*1024*1024 : 20*1024*1024;
  if(file.size > max) return Promise.reject(new Error(`파일이 너무 큽니다. ${type==="video"?"500MB":"20MB"} 이하로 해주세요.`));
  return new Promise((resolve, reject)=>{
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", CLOUDINARY_PRESET);
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e=>{ if(e.lengthComputable && onProgress) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = ()=>{
      const res = JSON.parse(xhr.responseText);
      if(res.secure_url) resolve(res.secure_url);
      else reject(new Error("업로드 실패: " + (res.error?.message||"서버 오류")));
    };
    xhr.onerror  = ()=>reject(new Error("인터넷 연결을 확인해 주세요."));
    xhr.ontimeout= ()=>reject(new Error("시간 초과. 다시 시도해 주세요."));
    xhr.timeout  = 5*60*1000;
    xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${type}/upload`);
    xhr.send(fd);
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOOKS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function useClock(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id);},[]);
  return t.toLocaleTimeString("ko-KR",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LD LOGO
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function LDLogo({size=54,a=1}){
  return(
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" style={{opacity:a,flexShrink:0}}>
      <circle cx="50" cy="50" r="46" stroke="#f0ece4" strokeWidth="5" fill="none"/>
      <text x="14" y="72" fontFamily="Georgia,serif" fontWeight="900" fontSize="62" fill="#f0ece4" letterSpacing="-2">LD</text>
    </svg>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   업로드 진행 오버레이
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function UploadOverlay({prog, text}){
  return(
    <div className="progress-overlay">
      <div style={{fontSize:13,color:"#f0ece4",fontWeight:700}}>{text} {prog}%</div>
      <div className="progress-bar-wrap"><div className="progress-bar-fill" style={{width:prog+"%"}}/></div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   영상 박스
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function VideoBox({url, titleRef, onSave}){
  const boxRef  = useRef(null);
  const fileRef = useRef(null);
  const vidRef  = useRef(null);
  const [src,setSrc]       = useState(url||"");
  const [prog,setProg]     = useState(0);
  const [loading,setLoading] = useState(false);
  const [error,setError]   = useState("");
  const [muted,setMuted]   = useState(true);
  const [playing,setPlaying] = useState(true);

  useEffect(()=>{ if(url) setSrc(url); },[url]);

  /* 타이틀 폭 맞춤 */
  useEffect(()=>{
    const sync=()=>{
      if(!titleRef?.current||!boxRef.current) return;
      const w = titleRef.current.getBoundingClientRect().width;
      if(w>0) boxRef.current.style.width = w+"px";
    };
    sync();
    const ro = new ResizeObserver(sync);
    if(titleRef?.current) ro.observe(titleRef.current);
    window.addEventListener("resize", sync);
    document.fonts?.ready.then(sync);
    return()=>{ro.disconnect(); window.removeEventListener("resize",sync);};
  },[titleRef]);

  const handleFile = async(e)=>{
    const file = e.target.files[0]; if(!file) return;
    setError(""); setLoading(true); setProg(0);
    try{
      const newUrl = await uploadFile(file, "video", setProg);
      setSrc(newUrl);
      await saveToSheet("메인 영상 URL", newUrl);
      if(onSave) onSave("메인 영상 URL", newUrl);
    }catch(err){ setError(err.message); }
    finally{ setLoading(false); e.target.value=""; }
  };

  const togglePlay=()=>{
    if(!vidRef.current) return;
    if(playing){ vidRef.current.pause(); setPlaying(false); }
    else{ vidRef.current.play(); setPlaying(true); }
  };
  const toggleMute=()=>{
    if(!vidRef.current) return;
    vidRef.current.muted = !muted;
    setMuted(!muted);
  };

  return(
    <div className="vbox-outer">
      <div className="vbox" ref={boxRef}>
        {src
          ?<video ref={vidRef} src={src} autoPlay muted loop playsInline style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
          :<div className="vbox-ph">
            <div style={{width:76,height:76,borderRadius:"50%",border:"1px solid rgba(240,236,228,.18)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:0,height:0,borderTop:"11px solid transparent",borderBottom:"11px solid transparent",borderLeft:"18px solid rgba(240,236,228,.38)",marginLeft:5}}/>
            </div>
            <span style={{fontSize:11,letterSpacing:".34em",color:"rgba(240,236,228,.22)",textTransform:"uppercase"}}>L O D FILM</span>
          </div>
        }
        {loading && <UploadOverlay prog={prog} text="업로드 중"/>}

        {/* 컨트롤바 */}
        {src && !loading && (
          <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(to top,rgba(0,0,0,.75),transparent)",padding:"32px 14px 12px",display:"flex",alignItems:"center",gap:8,zIndex:3}}>
            {/* 재생/정지 */}
            <button onClick={togglePlay} style={{background:"rgba(255,255,255,.18)",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {playing
                ?<svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                :<svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg>
              }
            </button>
            {/* 소리 버튼 — 안내 텍스트 포함 */}
            <button onClick={toggleMute}
              style={{background:"rgba(0,0,0,.55)",border:"none",borderRadius:20,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,backdropFilter:"blur(4px)"}}>
              {muted
                ?<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                  <span style={{fontSize:10,color:"#fff",fontWeight:700}}>탭→소리켜짐</span></>
                :<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54,8.46a5,5,0,0,1,0,7.07"/></svg>
                  <span style={{fontSize:10,color:"#fff",fontWeight:700}}>탭→음소거</span></>
              }
            </button>
            <div style={{flex:1}}/>
            <span style={{fontSize:9,color:"rgba(255,255,255,.5)",letterSpacing:".06em"}}>L O D</span>
          </div>
        )}

        {IS_ADMIN && !loading && (
          <button className="upload-btn" style={{bottom:src?50:10}} onClick={()=>fileRef.current?.click()}>
            {src?"📁 영상 교체":"📁 영상 업로드"}
          </button>
        )}
      </div>
      <input ref={fileRef} type="file" accept="video/*" style={{display:"none"}} onChange={handleFile}/>

    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   미디어 박스 — 1칸에 영상 또는 사진
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function MediaBox({videoUrl, photoUrl, onUpload, loading, prog, error}){
  const fileRef  = useRef(null);
  const vidRef   = useRef(null);
  const [muted,  setMuted]   = useState(true);
  const [playing,setPlaying] = useState(true);
  const hasMedia = videoUrl || photoUrl;

  const togglePlay=()=>{
    if(!vidRef.current) return;
    if(playing){ vidRef.current.pause(); setPlaying(false); }
    else{ vidRef.current.play(); setPlaying(true); }
  };
  const toggleMute=()=>{
    if(!vidRef.current) return;
    vidRef.current.muted = !muted;
    setMuted(!muted);
  };

  return(
    <div>
      <div className="lcard" style={{cursor:"default"}}>
        <div className="lcard-inner">
          {videoUrl
            ?<video ref={vidRef} src={videoUrl} autoPlay muted loop playsInline
                style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
            :photoUrl
              ?<img src={photoUrl} alt="팀 미디어"
                  style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
              :<>
                <div style={{width:56,height:56,border:"1px solid rgba(240,236,228,.15)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,color:"rgba(240,236,228,.2)"}}>+</div>
                <span style={{fontSize:11,letterSpacing:".2em",color:"rgba(240,236,228,.22)",textTransform:"uppercase"}}>사진 또는 영상</span>
              </>
          }
        </div>

        {loading && <UploadOverlay prog={prog} text="업로드 중"/>}

        {/* 소리 버튼 — 오른쪽 아래, 검정 반투명, 크게 */}
        {videoUrl && !loading && (
          <button onClick={toggleMute}
            style={{position:"absolute",bottom:12,right:12,background:"rgba(0,0,0,.72)",border:"none",borderRadius:22,padding:"8px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,zIndex:3,backdropFilter:"blur(4px)"}}>
            {muted
              ?<><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                <span style={{fontSize:13,color:"#fff",fontWeight:900,letterSpacing:".02em"}}>탭→소리켜짐</span></>
              :<><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54,8.46a5,5,0,0,1,0,7.07"/></svg>
                <span style={{fontSize:13,color:"#fff",fontWeight:900,letterSpacing:".02em"}}>탭→음소거</span></>
            }
          </button>
        )}

        {/* 관리자 업로드 버튼 */}
        {IS_ADMIN && !loading && (
          <button className="upload-btn"
            onClick={()=>fileRef.current?.click()}
            style={{bottom: videoUrl?52:10, fontSize:11, padding:"7px 16px"}}>
            {hasMedia ? "📁 교체하기" : "📁 사진 / 영상 올리기"}
          </button>
        )}
      </div>

      {/* 현재 미디어 타입 표시 (관리자) */}
      {IS_ADMIN && hasMedia && (
        <div style={{textAlign:"center",marginTop:6,fontSize:11,color:"rgba(240,236,228,.4)"}}>
          현재: {videoUrl?"🎬 영상":"📷 사진"} 올라가 있음
        </div>
      )}

      {error && <div style={{marginTop:6,fontSize:11,color:"rgba(255,140,140,.85)",textAlign:"center",lineHeight:1.5}}>{error}</div>}

      <input ref={fileRef} type="file" accept="image/*,video/*" style={{display:"none"}}
        onChange={e=>{ const f=e.target.files[0]; if(f&&onUpload) onUpload(f); e.target.value=""; }}/>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   룩북 카드
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function LookCard({look, onImageSaved, onClick}){
  const fileRef = useRef(null);
  const [src,setSrc]       = useState(look.url||"");
  const [prog,setProg]     = useState(0);
  const [loading,setLoading] = useState(false);
  const [error,setError]   = useState("");

  useEffect(()=>{ if(look.url) setSrc(look.url); },[look.url]);

  const handleFile = async(e)=>{
    const file = e.target.files[0]; if(!file) return;
    setError(""); setLoading(true); setProg(0);
    try{
      const newUrl = await uploadFile(file, "image", setProg);
      setSrc(newUrl);
      await saveToSheet(`룩북${look.id}_URL`, newUrl);
      if(onImageSaved) onImageSaved(look.id, newUrl);
    }catch(err){ setError(err.message); }
    finally{ setLoading(false); e.target.value=""; }
  };

  return(
    <div>
      <div className="lcard" onClick={()=>src&&onClick&&onClick({...look,url:src})}>
        <div className="lcard-inner">
          {src
            ?<img src={src} alt={look.label} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
            :<><div style={{width:42,height:42,border:"1px solid rgba(240,236,228,.12)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"rgba(240,236,228,.18)"}}>+</div>
              <span style={{fontSize:10,letterSpacing:".24em",textTransform:"uppercase",color:"rgba(240,236,228,.2)"}}>{look.label}</span></>
          }
        </div>
        {loading && <UploadOverlay prog={prog} text="업로드"/>}
        {IS_ADMIN && !loading && (
          <button className="upload-btn" style={{fontSize:10,padding:"5px 12px",bottom:8}}
            onClick={e=>{e.stopPropagation();fileRef.current?.click();}}>
            {src?"📷 교체":"📷 업로드"}
          </button>
        )}
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:10,opacity:0,transition:"opacity .3s",pointerEvents:"none",background:"linear-gradient(to top,rgba(0,0,0,.72) 0%,transparent 55%)"}} className="lcard-info">
          <div style={{fontSize:11,fontWeight:900,letterSpacing:".18em",textTransform:"uppercase",color:"rgba(240,236,228,.9)"}}>{look.style}</div>
        </div>
        <div style={{position:"absolute",top:10,left:10,fontSize:9,letterSpacing:".2em",color:"rgba(240,236,228,.22)"}}>{look.label}</div>
      </div>
      {error && <div style={{marginTop:4,fontSize:10,color:"rgba(255,140,140,.85)",lineHeight:1.5,textAlign:"center"}}>{error}</div>}
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   편집 모달
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function EditModal({label, value, onSave, onClose}){
  const [val,setVal] = useState(value);
  const [saving,setSaving] = useState(false);
  const save = async()=>{
    setSaving(true);
    await onSave(val);
    setSaving(false);
    onClose();
  };
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:700,color:"#f0ece4",marginBottom:14}}>✏️ {label} 수정</div>
        <textarea className="modal-textarea" value={val} onChange={e=>setVal(e.target.value)} autoFocus/>
        <div style={{marginTop:14,display:"flex",gap:8}}>
          <button onClick={save} disabled={saving}
            style={{background:"#FEE500",color:"#0a0a0a",border:"none",borderRadius:10,padding:"10px 24px",fontSize:13,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>
            {saving?"저장 중...":"✅ 저장"}
          </button>
          <button onClick={onClose}
            style={{background:"transparent",border:"1px solid rgba(240,236,228,.2)",color:"rgba(240,236,228,.55)",borderRadius:10,padding:"10px 18px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
            취소
          </button>
        </div>
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function Chat({open,onClose}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"안녕하세요! L O D AI 비서입니다 😊\n사입에 대해 궁금한 것을 무엇이든 물어보세요!"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const botRef=useRef(null); const inpRef=useRef(null);

  useEffect(()=>{if(open){setTimeout(()=>botRef.current?.scrollIntoView({behavior:"smooth"}),100);setTimeout(()=>inpRef.current?.focus(),320);}},[open,msgs.length]);

  const send=async()=>{
    const t=input.trim(); if(!t||loading) return;
    const nm=[...msgs,{role:"user",content:t}];
    setMsgs(nm); setInput(""); setLoading(true);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYS,messages:nm.map(m=>({role:m.role,content:m.content}))})});
      const d=await r.json();
      setMsgs(p=>[...p,{role:"assistant",content:d.content?.[0]?.text||"죄송합니다, 잠시 후 다시 시도해 주세요."}]);
    }catch{ setMsgs(p=>[...p,{role:"assistant",content:"연결에 문제가 생겼어요."}]); }
    setLoading(false);
  };
  const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};

  return(
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:899,background:"rgba(0,0,0,.6)",backdropFilter:"blur(4px)",opacity:open?1:0,pointerEvents:open?"auto":"none",transition:"opacity .35s"}}/>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:`translateX(-50%) translateY(${open?"0":"100%"})`,width:"100%",maxWidth:600,zIndex:900,height:"80vh",background:"#111",borderRadius:"24px 24px 0 0",border:"1px solid rgba(240,236,228,.15)",display:"flex",flexDirection:"column",boxShadow:"0 -8px 48px rgba(0,0,0,.7)",transition:"transform .4s cubic-bezier(.32,.72,0,1)"}}>
        <div style={{position:"absolute",top:8,left:"50%",transform:"translateX(-50%)",width:36,height:4,borderRadius:2,background:"rgba(240,236,228,.22)"}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 20px 14px",borderBottom:"1px solid rgba(240,236,228,.1)",flexShrink:0}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#f0ece4"}}>L O D AI 비서</div>
            <div style={{fontSize:10,color:"#FEE500",marginTop:2}}>● 24시간 응대</div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"rgba(240,236,228,.08)",border:"none",cursor:"pointer",fontSize:16,color:"rgba(240,236,228,.6)"}}>×</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{maxWidth:"83%",padding:"11px 15px",fontSize:14,lineHeight:1.65,whiteSpace:"pre-wrap",wordBreak:"keep-all",borderRadius:m.role==="user"?"20px 20px 6px 20px":"20px 20px 20px 6px",background:m.role==="user"?"#FEE500":"rgba(240,236,228,.08)",color:m.role==="user"?"#0a0a0a":"#f0ece4",fontWeight:m.role==="user"?600:400,alignSelf:m.role==="user"?"flex-end":"flex-start"}}>{m.content}</div>
          ))}
          {loading&&<div style={{alignSelf:"flex-start",padding:"11px 16px",borderRadius:"20px 20px 20px 6px",background:"rgba(240,236,228,.08)",display:"flex",gap:5,alignItems:"center"}}>
            {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"rgba(240,236,228,.42)",animation:`dotB 1.2s ease-in-out ${i*.2}s infinite`}}/>)}
          </div>}
          <div ref={botRef}/>
        </div>
        <div style={{padding:"10px 14px 18px",borderTop:"1px solid rgba(240,236,228,.1)",display:"flex",gap:8,alignItems:"flex-end",flexShrink:0}}>
          <textarea ref={inpRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey} placeholder="사입에 대해 무엇이든 물어보세요..." rows={1}
            style={{flex:1,background:"rgba(240,236,228,.07)",border:"1px solid rgba(240,236,228,.15)",borderRadius:18,padding:"11px 15px",fontSize:14,color:"#f0ece4",resize:"none",fontFamily:"inherit",lineHeight:1.5,maxHeight:90,overflowY:"auto"}}/>
          <button onClick={send} disabled={loading||!input.trim()}
            style={{width:42,height:42,borderRadius:"50%",background:input.trim()&&!loading?"#FEE500":"rgba(240,236,228,.1)",border:"none",cursor:input.trim()&&!loading?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"background .2s"}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13" stroke={input.trim()&&!loading?"#0a0a0a":"rgba(240,236,228,.28)"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>

            </svg>

          <div style={{position:"relative",zIndex:1}}>
            <div style={{fontSize:10,letterSpacing:".4em",color:"rgba(240,236,228,.3)",marginBottom:16}}>L O D · AI FASHION</div>

            <div style={{width:40,height:1,background:"rgba(240,236,228,.3)",margin:"0 auto 16px"}}/>
            <a href={aiKakaoLink} target="_blank" rel="noopener noreferrer"

                <input defaultValue={aiKakaoLink} placeholder="https://open.kakao.com/..."
                  onBlur={e=>{

                    saveToSheet("AI카카오링크", e.target.value);

                  style={{flex:1,background:"rgba(255,255,255,.07)",border:"1px solid rgba(240,236,228,.2)",borderRadius:10,padding:"6px 10px",fontSize:11,color:"#f0ece4",fontFamily:"inherit",outline:"none"}}/>

      </div>
      <footer style={{padding:"52px 20px 40px",textAlign:"center",borderTop:"1px solid rgba(240,236,228,.07)",borderRadius:"22px 22px 0 0",background:"#0d0d0d",marginTop:48}}>
        <svg width="44" height="44" viewBox="0 0 100 100" fill="none" style={{margin:"0 auto",display:"block"}}>
          <circle cx="50" cy="50" r="46" stroke="rgba(240,236,228,.2)" strokeWidth="5" fill="none"/>
          <text x="14" y="72" fontFamily="Georgia,serif" fontWeight="900" fontSize="62" fill="rgba(240,236,228,.2)" letterSpacing="-2">LD</text>
        </svg>
        <div style={{fontSize:16,fontWeight:900,letterSpacing:".26em",color:"rgba(240,236,228,.2)",margin:"10px 0"}}>L O D</div>
        <p style={{fontSize:11,color:"rgba(240,236,228,.18)",letterSpacing:".1em",lineHeight:2.1}}>
          Layer On Drape · 동대문 새벽시장 전문 사입 서비스<br/>정확한 픽업, 꼼꼼한 검수 · 마감 AM 03:00
        </p>
      </footer>

      {/* 룩북 모달 */}
      {modal && (
        <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,zIndex:800,background:"rgba(4,4,4,.97)",backdropFilter:"blur(16px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeIn .2s ease"}}>
          <button onClick={()=>setModal(null)} style={{position:"fixed",top:16,right:16,width:42,height:42,borderRadius:"50%",border:"1px solid rgba(240,236,228,.25)",background:"transparent",color:"rgba(240,236,228,.6)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:810}}>×</button>
          {mIdx>0&&<button onClick={e=>{e.stopPropagation();prev();}} style={{position:"fixed",left:10,top:"50%",transform:"translateY(-50%)",width:40,height:40,borderRadius:"50%",border:"1px solid rgba(240,236,228,.2)",background:"transparent",color:"rgba(240,236,228,.55)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:810}}>‹</button>}
          {mIdx<looks.length-1&&<button onClick={e=>{e.stopPropagation();next();}} style={{position:"fixed",right:10,top:"50%",transform:"translateY(-50%)",width:40,height:40,borderRadius:"50%",border:"1px solid rgba(240,236,228,.2)",background:"transparent",color:"rgba(240,236,228,.55)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:810}}>›</button>}
          <div onClick={e=>e.stopPropagation()} style={{width:"min(280px,70vw)",display:"flex",flexDirection:"column",gap:12}}>
            <div style={{paddingTop:"177.78%",position:"relative",borderRadius:22,border:"1px solid rgba(240,236,228,.12)",overflow:"hidden",background:"#181818"}}>
              {modal.url
                ?<img src={modal.url} alt={modal.label} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>

      {editField && (
        <EditModal label={editField.label} value={editField.value}
          onSave={val=>handleSave(editField.key, val)}
          onClose={()=>setEditField(null)}/>

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   에이전트 페이지
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function AgentPage({ag, onBack, allAgents, onAgent, sheetData, onDataUpdate}){
  const titleRef  = useRef(null);
  const teamTitleRef = useRef(null);
  const mediaWrapRef = useRef(null);
  const kakaoWrapRef = useRef(null);

  // 팀 이름 폭 → 미디어박스 + 카카오버튼 동기화
  useEffect(()=>{
    if(!pageReady) return;
    const sync=()=>{
      if(!teamTitleRef.current||!mediaWrapRef.current||!kakaoWrapRef.current) return;
      const w = teamTitleRef.current.getBoundingClientRect().width;
      if(w>10){
        mediaWrapRef.current.style.width = w+"px";
        kakaoWrapRef.current.style.width = w+"px";
      }
    };
    sync();
    [100,300,600,1000].forEach(t=>setTimeout(sync,t));
    document.fonts?.ready.then(()=>{ sync(); setTimeout(sync,200); });
    const ro = new ResizeObserver(sync);
    if(teamTitleRef.current) ro.observe(teamTitleRef.current);
    window.addEventListener("resize", sync);
    return()=>{ ro.disconnect(); window.removeEventListener("resize",sync); };
  },[pageReady, ag.id]);

  // 팀별 데이터 키
  const prefix   = ag.id==="SN" ? "강북팀" : "인천팀";
  const videoKey = `${prefix}_영상URL`;
  const photoKey = `${prefix}_사진URL`;
  const introKey = `${prefix}_소개`;
  const noticeKey= `${prefix}_공지`;
  const kakaoKey = `${prefix}_카카오`;

  const [videoUrl, setVideoUrl] = useState("");
  const [photoUrl, setPhotoUrl] = useState("");
  const [intro,    setIntro   ] = useState("");
  const [notice,   setNotice  ] = useState("");
  const [kakaoUrl, setKakaoUrl] = useState("");
  const [editField,setEditField] = useState(null);

  // 영상 업로드 상태
  const [vidProg,    setVidProg   ] = useState(0);
  const [vidLoading, setVidLoading] = useState(false);
  const [vidError,   setVidError  ] = useState("");

  // 사진 업로드 상태
  const [imgProg,    setImgProg   ] = useState(0);
  const [imgLoading, setImgLoading] = useState(false);
  const [imgError,   setImgError  ] = useState("");

  // 팀 바뀔 때마다 상태 초기화 — 강북→인천 이동 시 영상 섞임 방지
  const [pageReady, setPageReady] = useState(false);
  useEffect(()=>{
    setPageReady(false);
    setVideoUrl(sheetData[videoKey]||"");
    setPhotoUrl(sheetData[photoKey]||"");
    setIntro(sheetData[introKey]||ag.intro||"");
    setNotice(sheetData[noticeKey]||"");
    setKakaoUrl(sheetData[kakaoKey]||ag.kakao||"");
    setEditField(null);
    window.scrollTo({top:0});
    setTimeout(()=>setPageReady(true), 100);
  },[ag.id]);

  const handleVideo = async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    setVidError(""); setVidLoading(true); setVidProg(0);
    try{
      const url = await uploadFile(file,"video",setVidProg);
      setVideoUrl(url);
      await saveToSheet(videoKey, url);
      if(onDataUpdate) onDataUpdate(videoKey, url);
    }catch(err){ setVidError(err.message); }
    finally{ setVidLoading(false); e.target.value=""; }
  };

  const handlePhoto = async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    setImgError(""); setImgLoading(true); setImgProg(0);
    try{
      const url = await uploadFile(file,"image",setImgProg);
      setPhotoUrl(url);
      await saveToSheet(photoKey, url);
      if(onDataUpdate) onDataUpdate(photoKey, url);
    }catch(err){ setImgError(err.message); }
    finally{ setImgLoading(false); e.target.value=""; }
  };

  const openEdit=(key,label,val)=>setEditField({key,label,value:val});
  const handleSave=async(key,val)=>{
    if(key===introKey) setIntro(val);
    if(key===noticeKey) setNotice(val);
    await saveToSheet(key,val);
    if(onDataUpdate) onDataUpdate(key,val);
  };

  if(!pageReady) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid rgba(240,236,228,.15)",borderTop:"3px solid #FEE500",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
      <div style={{fontSize:12,color:"rgba(240,236,228,.4)",letterSpacing:".1em"}}>로딩 중...</div>
    </div>
  );

  return(
    <div className="fade-in">
      {/* ← BACK 버튼 — 노란색 크게 */}
      <div style={{padding:"20px 20px 0"}}>
        <button onClick={onBack}
          style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:10,padding:0,fontFamily:"inherit"}}
          onMouseEnter={e=>e.currentTarget.style.opacity=".7"}
          onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
          <span style={{fontSize:28,color:"#FEE500",fontWeight:900}}>←</span>
          <span style={{fontSize:18,fontWeight:900,color:"#FEE500",letterSpacing:".12em"}}>BACK</span>
        </button>
      </div>

      {/* 팀 이름 + 미디어박스 + 카카오 — 같은 컨테이너로 폭 자동 맞춤 */}
      <div style={{padding:"16px 20px 0",display:"flex",justifyContent:"center"}}>
        <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",gap:14,width:"auto"}}>

          {/* 팀 이름 */}
          <div style={{textAlign:"center",width:"100%"}}>
            <div style={{fontSize:10,letterSpacing:".32em",color:"rgba(240,236,228,.28)",textTransform:"uppercase",marginBottom:8}}>{ag.regionEn}</div>
            <h2 style={{fontSize:"clamp(28px,8vw,44px)",fontWeight:900,lineHeight:1.15,whiteSpace:"nowrap"}}>{ag.label}</h2>
          </div>

          {/* 미디어 박스 — 팀 이름과 같은 폭 자동 적용 */}
          <div style={{width:"100%"}}>
            <MediaBox
              videoUrl={videoUrl}
              photoUrl={photoUrl}
              onUpload={async(file)=>{
                const isVideo = file.type.startsWith("video/");
                const type    = isVideo ? "video" : "image";
                const key     = isVideo ? videoKey : photoKey;
                if(isVideo){ setVidError(""); setVidLoading(true); setVidProg(0); }
                else        { setImgError(""); setImgLoading(true); setImgProg(0); }
                try{
                  const url = await uploadFile(file, type, isVideo?setVidProg:setImgProg);
                  if(isVideo){ setVideoUrl(url); setPhotoUrl(""); }
                  else        { setPhotoUrl(url); setVideoUrl(""); }
                  await saveToSheet(key, url);
                  await saveToSheet(isVideo?photoKey:videoKey, "");
                  if(onDataUpdate){ onDataUpdate(key,url); onDataUpdate(isVideo?photoKey:videoKey,""); }
                }catch(err){
                  if(isVideo) setVidError(err.message);
                  else        setImgError(err.message);
                }finally{
                  if(isVideo) setVidLoading(false);
                  else        setImgLoading(false);
                }
              }}
              loading={vidLoading||imgLoading}
              prog={vidLoading?vidProg:imgProg}
              error={vidError||imgError}
            />
          </div>

          {/* 카카오톡 버튼 — 같은 폭 */}
          <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
            <a href={kakaoUrl||ag.kakao} target="_blank" rel="noopener noreferrer"
              style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:10,background:"#FEE500",color:"#0a0a0a",padding:"16px",fontSize:14,fontWeight:900,textDecoration:"none",textTransform:"uppercase",borderRadius:50,letterSpacing:".08em",transition:"opacity .2s",textAlign:"center",boxSizing:"border-box"}}
              onMouseEnter={e=>e.currentTarget.style.opacity=".85"}
              onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#0a0a0a"><path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.56 1.48 4.83 3.74 6.26l-.95 3.54 4.1-2.04c.67.1 1.37.16 2.11.16 4.97 0 9-3.36 9-7.5S16.97 3 12 3z"/></svg>
              카카오톡 문의
            </a>
            {IS_ADMIN && (
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:10,color:"rgba(240,236,228,.4)",whiteSpace:"nowrap",flexShrink:0}}>링크:</span>
                <input defaultValue={kakaoUrl||ag.kakao} placeholder="https://open.kakao.com/..."
                  onBlur={async(e)=>{
                    const val=e.target.value;
                    setKakaoUrl(val);
                    await saveToSheet(kakaoKey, val);
                    if(onDataUpdate) onDataUpdate(kakaoKey, val);
                  }}
                  style={{flex:1,background:"rgba(255,255,255,.07)",border:"1px solid rgba(240,236,228,.2)",borderRadius:10,padding:"6px 10px",fontSize:11,color:"#f0ece4",fontFamily:"inherit",outline:"none"}}/>
              </div>
            )}
          </div>

        </div>
      </div>

      {/* 공지사항 */}
      <div style={{padding:"14px 20px 0"}}>
        {(notice||IS_ADMIN) && (
          <div
            onClick={()=>IS_ADMIN&&openEdit(noticeKey,"공지사항",notice)}
            className={IS_ADMIN?"editable":""}
            style={{background:"rgba(254,229,0,.1)",border:"1px solid rgba(254,229,0,.3)",borderRadius:16,padding:"12px 18px",fontSize:14,fontWeight:700,color:"#FEE500",textAlign:"center",lineHeight:1.6,cursor:IS_ADMIN?"pointer":"default"}}>
            {notice||"📢 (공지사항을 입력하세요)"}
          </div>
        )}
      </div>

      {/* 소개글 */}
      <div style={{padding:"20px 20px 0"}}>
        <div
          onClick={()=>IS_ADMIN&&openEdit(introKey,"소개글",intro)}
          className={IS_ADMIN?"editable":""}
          style={{background:"rgba(240,236,228,.03)",border:"1px solid rgba(240,236,228,.08)",borderRadius:20,padding:"20px",cursor:IS_ADMIN?"pointer":"default"}}>
          {intro
            ?(intro.split("\n").map((line,i)=>(
                <p key={i} style={{fontSize:"clamp(16px,4.5vw,20px)",lineHeight:1.9,color:"rgba(240,236,228,.88)",marginBottom:i<intro.split("\n").length-1?10:0,wordBreak:"keep-all"}}>{line}</p>
              )))
            :<p style={{fontSize:15,color:"rgba(240,236,228,.3)",textAlign:"center"}}>{IS_ADMIN?"(소개글을 클릭해서 입력하세요)":"소개글이 없습니다."}</p>
          }
        </div>
      </div>

      {/* 다른 지역 담당 */}
      <div style={{padding:"28px 20px 0"}}>
        <div style={{fontSize:13,letterSpacing:".2em",color:"rgba(240,236,228,.26)",textTransform:"uppercase",marginBottom:14,textAlign:"center"}}>다른 지역 담당</div>
        {allAgents.filter(a=>a.id!==ag.id).map(other=>(
          <button key={other.id} onClick={()=>onAgent(other)}
            style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"20px 24px",background:"#FEE500",border:"none",borderRadius:18,cursor:"pointer",fontFamily:"inherit",marginBottom:10,transition:"all .22s"}}
            onMouseEnter={e=>{e.currentTarget.style.filter="brightness(1.06)";}}
            onMouseLeave={e=>{e.currentTarget.style.filter="brightness(1)";}}>
            <div style={{fontSize:"clamp(16px,4.8vw,22px)",fontWeight:900,color:"#0a0a0a",flex:1,textAlign:"center"}}>{other.label}</div>
            <span style={{fontSize:"clamp(20px,5.5vw,26px)",color:"#0a0a0a"}}>→</span>
          </button>
        ))}
      </div>

      <div style={{height:48}}/>

      {editField && (
        <EditModal label={editField.label} value={editField.value}
          onSave={val=>handleSave(editField.key,val)}
          onClose={()=>setEditField(null)}/>
      )}
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   APP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function App(){
  const [page,setPage]   = useState("main");
  const [ag,setAg]       = useState(null);
  const [chatOpen,setChatOpen] = useState(false);
  const [data,setData]   = useState({...DEFAULTS});
  const [saipLink, setSaipLink] = useState(()=>{
    try{ return localStorage.getItem("lod_saip_link")||"https://yongsaib.sosolution.net/login"; }
    catch{ return "https://yongsaib.sosolution.net/login"; }
  });
  const [editSaip, setEditSaip] = useState(false);
  const [saipInput, setSaipInput] = useState(saipLink);

  const saveSaipLink = ()=>{
    setSaipLink(saipInput);
    try{ localStorage.setItem("lod_saip_link", saipInput); }catch{}
    saveToSheet("사입 프로그램", saipInput);
    setEditSaip(false);
  };

  // 시트에서 에이전트 데이터 로드
  useEffect(()=>{
    loadSheet(sheetData=>{
      setData(sheetData);
      // 시트에 사입 프로그램 링크 있으면 적용
      if(sheetData["사입 프로그램"]){
        setSaipLink(sheetData["사입 프로그램"]);
        setSaipInput(sheetData["사입 프로그램"]);
      }
    });
  },[]);

  const allAgents = [
    {id:"SN",label:data["강북팀 이름"],kakao:data["강북팀 카카오"],deadline:data["강북팀 마감"],intro:data["강북팀 소개"],regionEn:"SEOUL NORTH AREA"},
    {id:"IB",label:data["인천팀 이름"],kakao:data["인천팀 카카오"],deadline:data["인천팀 마감"],intro:data["인천팀 소개"],regionEn:"INCHEON · BUCHEON"},
  ];

  const goAgent = a=>{ setAg(a); setPage("agent"); window.scrollTo({top:0}); };
  const goMain  = ()=>{ setPage("main"); setAg(null); };

  return(
    <div className="shell">
      <div className="nav">
        <button onClick={goMain} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:10}}>
          <LDLogo size={54}/>
          <span style={{fontSize:13,fontWeight:300,color:"rgba(240,236,228,.62)",letterSpacing:".22em",textTransform:"uppercase"}}>Layer On Drape</span>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {IS_ADMIN && <span style={{background:"#FEE500",color:"#0a0a0a",fontSize:10,fontWeight:900,padding:"3px 10px",borderRadius:20,letterSpacing:".06em"}}>관리자</span>}
          <a href={saipLink} target="_blank" rel="noopener noreferrer"
            style={{background:"#f0ece4",color:"#0a0a0a",padding:"10px 18px",fontSize:13,fontWeight:900,textDecoration:"none",borderRadius:50,whiteSpace:"nowrap",transition:"opacity .2s"}}
            onMouseEnter={e=>e.currentTarget.style.opacity=".82"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
            사입 프로그램
          </a>
        </div>
      </div>

      {/* 관리자: 사입 프로그램 링크 입력 */}
      {IS_ADMIN && (
        <div style={{background:"rgba(254,229,0,.08)",borderBottom:"1px solid rgba(254,229,0,.2)",padding:"10px 16px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:"#FEE500",fontWeight:700,whiteSpace:"nowrap"}}>🔗 사입 프로그램 링크:</span>
          {editSaip
            ?<>
              <input value={saipInput} onChange={e=>setSaipInput(e.target.value)}
                placeholder="https://..."
                style={{flex:1,minWidth:180,background:"rgba(255,255,255,.08)",border:"1px solid rgba(254,229,0,.4)",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#f0ece4",fontFamily:"inherit",outline:"none"}}/>
              <button onClick={saveSaipLink}
                style={{background:"#FEE500",color:"#0a0a0a",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:900,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                ✅ 저장
              </button>
              <button onClick={()=>setEditSaip(false)}
                style={{background:"transparent",border:"1px solid rgba(240,236,228,.2)",color:"rgba(240,236,228,.5)",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                취소
              </button>
            </>
            :<>
              <span style={{fontSize:11,color:"rgba(240,236,228,.5)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{saipLink}</span>
              <button onClick={()=>setEditSaip(true)}
                style={{background:"rgba(254,229,0,.2)",color:"#FEE500",border:"1px solid rgba(254,229,0,.3)",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                ✏️ 수정
              </button>
            </>
          }
        </div>
      )}

      <div className="fade-in" key={page}>
        {page==="main"
          ?<MainPage onAgent={goAgent} onChat={()=>setChatOpen(true)}/>
          :<AgentPage ag={ag} onBack={goMain} allAgents={allAgents} onAgent={goAgent}
              sheetData={data}
              onDataUpdate={(key,val)=>setData(d=>({...d,[key]:val}))}/>
        }
      </div>

      <Chat open={chatOpen} onClose={()=>setChatOpen(false)}/>

      <div style={{position:"sticky",bottom:0,display:"flex",justifyContent:"flex-end",padding:"0 16px 20px",marginTop:-62,pointerEvents:"none"}}>
        <button onClick={()=>setChatOpen(v=>!v)} className={chatOpen?"":"float-pulse"}
          style={{width:54,height:54,borderRadius:"50%",background:"#FEE500",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(254,229,0,.45)",transition:"transform .2s",pointerEvents:"auto"}}
          onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"}
          onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
          {chatOpen
            ?<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#0a0a0a" strokeWidth="2.5" strokeLinecap="round"/></svg>
            :<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="#0a0a0a" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          }
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
