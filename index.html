const MAIN_KAKAO = "https://open.kakao.com/LOD_MAIN";
const SYSTEM_PROMPT = `당신은 동대문 새벽시장 전문 사입 서비스 'L O D'의 24시간 AI 비서입니다. 사입 서비스, 동대문 시장, 패션 트렌드, 배송, 검수에 대해 친절하고 전문적으로 답변하세요. 담당 지역: 서울 강북권(18년 경력), 인천·부천(20년 경력). 사입 마감: 매일 AM 03:00. 단품 1장부터 접수 가능. 2-4문장으로 한국어로만 답변하세요.`;

// ── HOOKS ─────────────────────────────────────────────────────
function useClock() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setT(new Date()), 1000); return () => clearInterval(id); }, []);
  return t.toLocaleTimeString("ko-KR", { hour12: false, hour:"2-digit", minute:"2-digit", second:"2-digit" });
}
function useIsMobile() {
  const [m, setM] = useState(window.innerWidth < 860);
  useEffect(() => {
    const fn = () => setM(window.innerWidth < 860);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return m;
}

// ── LD LOGO ───────────────────────────────────────────────────
function LDLogo({ size = 60 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="46" stroke="#f0ece4" strokeWidth="5" fill="none"/>
      <text x="14" y="72" fontFamily="Georgia,serif" fontWeight="900" fontSize="62" fill="#f0ece4" letterSpacing="-2">LD</text>
    </svg>
  );
}

// ── VIDEO BOX ─────────────────────────────────────────────────
function VideoBox({ videoUrl, label }) {
  return (
    <div className="video-box">
      {videoUrl
        ? <video src={videoUrl} autoPlay muted loop playsInline />
        : <div className="video-placeholder">
            <div className="play-circle"><div className="play-icon" /></div>
            <span className="video-label">{label || "VIDEO PLAY"}</span>
          </div>
      }
    </div>
  );
}

// ── LOOK MODAL ────────────────────────────────────────────────
function LookModal({ look, onClose, onPrev, onNext, idx, total }) {
  useEffect(() => {
    const fn = e => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowLeft") onPrev();
      if (e.key === "ArrowRight") onNext();
    };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, []);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <button className="modal-close" onClick={onClose}>×</button>
      {idx > 0 && <button className="modal-nav" style={{left:"16px"}} onClick={e=>{e.stopPropagation();onPrev();}}>‹</button>}
      {idx < total-1 && <button className="modal-nav" style={{right:"16px"}} onClick={e=>{e.stopPropagation();onNext();}}>›</button>}
      <div className="modal-img" onClick={e=>e.stopPropagation()}>
        <div className="modal-frame">
          <div className="modal-label">{look.label}</div>
          <div className="modal-sub">AI MODEL · L O D</div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <div style={{fontSize:"13px",fontWeight:900,letterSpacing:".18em",color:"rgba(240,236,228,.75)",textTransform:"uppercase"}}>{look.style}</div>
            <div style={{fontSize:"10px",letterSpacing:".12em",color:"rgba(240,236,228,.3)",marginTop:"3px"}}>{look.label}</div>
          </div>
          <div style={{fontSize:"10px",color:"rgba(240,236,228,.22)"}}>{idx+1} / {total}</div>
        </div>
        <div className="modal-dots">
          {LOOKS.map((_,i) => (
            <div key={i} className="modal-dot" style={{width: i===idx?"20px":"5px", background: i===idx?"rgba(240,236,228,.65)":"rgba(240,236,228,.18)"}} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ── AI CHAT ───────────────────────────────────────────────────
function AiChat({ open, onClose, isMobile }) {
  const [msgs, setMsgs] = useState([{ role:"assistant", content:"안녕하세요! L O D AI 비서입니다 😊\n사입에 대해 궁금한 것을 무엇이든 물어보세요!" }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (open) {
      setTimeout(() => bottomRef.current?.scrollIntoView({ behavior:"smooth" }), 100);
      setTimeout(() => inputRef.current?.focus(), 320);
    }
  }, [open, msgs.length]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    const newMsgs = [...msgs, { role:"user", content:text }];
    setMsgs(newMsgs); setInput(""); setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:SYSTEM_PROMPT, messages:newMsgs.map(m=>({role:m.role,content:m.content})) }),
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || "죄송합니다, 잠시 후 다시 시도해 주세요.";
      setMsgs(prev => [...prev, { role:"assistant", content:reply }]);
    } catch {
      setMsgs(prev => [...prev, { role:"assistant", content:"연결에 문제가 생겼어요. 잠시 후 다시 시도해 주세요." }]);
    }
    setLoading(false);
  };

  const onKey = e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(); } };
  const cls = isMobile ? `chat-sheet-mobile ${open?"open":"closed"}` : `chat-pc ${open?"open":"closed"}`;

  return (
    <>
      {isMobile && <div className="dim" style={{opacity:open?1:0,pointerEvents:open?"auto":"none"}} onClick={onClose} />}
      <div className={cls}>
        <div className="chat-header">
          {isMobile && <div className="chat-handle" />}
          <div>
            <div className="chat-title">L O D AI 비서</div>
            <div className="chat-online">● 24시간 응대</div>
          </div>
          <button className="chat-x" onClick={onClose}>×</button>
        </div>
        <div className="chat-msgs">
          {msgs.map((msg,i) => (
            <div key={i} className={`bubble ${msg.role==="user"?"user":"ai"}`}>{msg.content}</div>
          ))}
          {loading && (
            <div className="dots-bubble">
              {[0,1,2].map(i => <div key={i} className="dot-anim" style={{animation:`dotBounce 1.2s ease-in-out ${i*.2}s infinite`}} />)}
            </div>
          )}
          <div ref={bottomRef} />
        </div>
        <div className="chat-input-row">
          <textarea ref={inputRef} className="chat-textarea" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey} placeholder="사입에 대해 무엇이든 물어보세요..." rows={1} />
          <button className={`chat-send ${input.trim()&&!loading?"active":"inactive"}`} onClick={send} disabled={loading||!input.trim()}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13" stroke={input.trim()&&!loading?"#0a0a0a":"rgba(240,236,228,.28)"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke={input.trim()&&!loading?"#0a0a0a":"rgba(240,236,228,.28)"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </>
  );
}

// ── MAIN PAGE ─────────────────────────────────────────────────
function MainPage({ onAgent, onOpenChat }) {
  const clock = useClock();
  const [modal, setModal] = useState(null);
  const [modalIdx, setModalIdx] = useState(0);

  const openModal = (look) => { setModal(look); setModalIdx(LOOKS.findIndex(l=>l.id===look.id)); };
  const goPrev = () => { if(modalIdx>0){setModalIdx(i=>i-1);setModal(LOOKS[modalIdx-1]);} };
  const goNext = () => { if(modalIdx<LOOKS.length-1){setModalIdx(i=>i+1);setModal(LOOKS[modalIdx+1]);} };

  return (
    <div style={{background:"#0a0a0a",color:"#f0ece4"}}>
      {/* HERO */}
      <section className="hero">
        <div className="hero-left">
          <div style={{width:"100%",maxWidth:"520px"}}>
            <VideoBox label="L O D FILM" />
          </div>
        </div>
        <div className="hero-right">
          {/* 타이틀 */}
          <div style={{textAlign:"center",padding:"6px 0"}}>
            <div style={{fontSize:"clamp(42px,6vw,62px)",letterSpacing:".1em",color:"#f0ece4",fontWeight:900,lineHeight:1.25,wordBreak:"keep-all"}}>
              동대문 새벽시장<br/>전문 사입 서비스
            </div>
          </div>

          {/* 챗 버튼 */}
          <button className="chat-trigger" onClick={onOpenChat}>
            💬 사입에 대해 무엇이든 물어보세요<br/>
            <span style={{display:"block",textAlign:"center",marginTop:"5px",fontSize:"0.9em"}}>24시 AI 챗!!</span>
          </button>

          {/* 시계 + 스텝 */}
          <div className="clock-section">
            <div className="clock-label">CURRENT MARKET TIME</div>
            <div className="clock-time">{clock}</div>
            <div className="steps-box">
              <div className="steps-label">사입 진행 방식</div>
              <div className="steps-row">
                {STEPS.map((step,i) => (
                  <div key={i} className="step-item">
                    <span className="step-text">{step}</span>
                    {i < STEPS.length-1 && <span className="step-arrow">▶</span>}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* PR 문구 */}
          <div className="pr-box">
            <p className="pr-text">지역 담당 삼촌들의 평균 경력은<br/>10~15년 이상의 베테랑들입니다.</p>
            <p className="pr-text" style={{marginTop:"6px"}}>트렌드와 마켓 정보를 함께 공유해 드립니다.</p>
          </div>

          {/* 지역 선택 */}
          <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
            {AGENTS.map(agent => (
              <button key={agent.id} className="region-btn" onClick={() => onAgent(agent)}>
                <div>
                  <div className="region-label">{agent.regionLabel}</div>
                  <div className="region-sub">{agent.career} 전문가 팀</div>
                </div>
                <span className="region-arrow">→</span>
              </button>
            ))}
          </div>
        </div>
      </section>

      {/* EDITORIAL */}
      <section className="editorial">
        <div className="editorial-bg-text">AI EDITORIAL</div>
        <h2 className="editorial-title">인플루언서 패션 AI 모델 제작</h2>
        <div className="editorial-sub">L O D COLLECTION 2026</div>
        <div className="look-grid">
          {LOOKS.map(look => (
            <div key={look.id} className="look-card" onClick={() => openModal(look)}>
              <div className="look-card-inner">
                <div className="look-plus">+</div>
                <span className="look-num">{look.label}</span>
              </div>
              <div className="look-badge">{look.label}</div>
              <div className="look-hover-info">
                <div className="look-style">{look.style}</div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* FOOTER */}
      <footer>
        <svg width="52" height="52" viewBox="0 0 100 100" fill="none" style={{margin:"0 auto",display:"block"}}>
          <circle cx="50" cy="50" r="46" stroke="rgba(240,236,228,.22)" strokeWidth="5" fill="none"/>
          <text x="14" y="72" fontFamily="Georgia,serif" fontWeight="900" fontSize="62" fill="rgba(240,236,228,.22)" letterSpacing="-2">LD</text>
        </svg>
        <div className="footer-brand">L O D</div>
        <p className="footer-sub">Layer On Drape · 동대문 새벽시장 전문 사입 서비스<br/>정확한 픽업, 꼼꼼한 검수 · 마감 AM 03:00</p>
      </footer>

      {modal && <LookModal look={modal} onClose={()=>setModal(null)} onPrev={goPrev} onNext={goNext} idx={modalIdx} total={LOOKS.length} />}
    </div>
  );
}

// ── AGENT PAGE ────────────────────────────────────────────────
function AgentPage({ agent, onBack, onAgent }) {
  useEffect(() => { window.scrollTo({ top:0 }); }, [agent.id]);
  return (
    <div className="agent-page">
      <div style={{maxWidth:"1360px",margin:"0 auto",padding:"120px 72px 0"}}>
        <button className="back-btn" onClick={onBack}><span style={{fontSize:"18px"}}>←</span> Back to L O D</button>
      </div>
      <div className="agent-grid" style={{marginTop:"48px"}}>
        <div className="agent-left">
          <VideoBox label={`${agent.regionLabel} 소개 영상`} />
          <div style={{marginTop:"24px",display:"flex",flexDirection:"column",gap:"8px"}}>
            <a href={agent.kakaoUrl} target="_blank" rel="noopener noreferrer" className="kakao-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#0a0a0a"><path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.56 1.48 4.83 3.74 6.26l-.95 3.54 4.1-2.04c.67.1 1.37.16 2.11.16 4.97 0 9-3.36 9-7.5S16.97 3 12 3z"/></svg>
              카카오톡 사입 문의하기
            </a>
            <div style={{textAlign:"center",fontSize:"10px",letterSpacing:".18em",color:"rgba(240,236,228,.2)",textTransform:"uppercase"}}>마감 AM 03:00</div>
          </div>
        </div>
        <div className="agent-right">
          <div>
            <div className="agent-region-en">{agent.regionEn}</div>
            <h2 className="agent-name">{agent.regionLabel}</h2>
            <div className="agent-career">{agent.career} 베테랑 팀</div>
          </div>
          <div>
            <div className="section-label">Introduction</div>
            {agent.intro.map((line,i) => (
              <p key={i} className={i===0?"intro-line-0":"intro-line-n"}>{line}</p>
            ))}
          </div>
          <div>
            <div className="section-label">사입 안내</div>
            {agent.rules.map((rule,i) => (
              <div key={i} className="rule-row">
                <span className="rule-title">{rule.title}</span>
                <span className="rule-desc">{rule.desc}</span>
              </div>
            ))}
          </div>
          <div style={{borderTop:"1px solid rgba(240,236,228,.07)",paddingTop:"28px"}}>
            <div className="section-label" style={{marginBottom:"16px"}}>다른 지역 담당</div>
            {AGENTS.filter(a=>a.id!==agent.id).map(other => (
              <button key={other.id} className="other-btn" onClick={()=>onAgent(other)}>
                <div>
                  <div className="other-region">{other.regionLabel}</div>
                  <div className="other-career">{other.career}</div>
                </div>
                <span className="other-arrow">→</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("main");
  const [agent, setAgent] = useState(null);
  const [chatOpen, setChatOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const isMobile = useIsMobile();

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 80);
    window.addEventListener("scroll", fn, { passive:true });
    return () => window.removeEventListener("scroll", fn);
  }, []);

  const goAgent = (a) => { setAgent(a); setPage("agent"); window.scrollTo({top:0}); };
  const goMain  = ()  => { setPage("main"); setAgent(null); };

  return (
    <>
      <nav className={scrolled ? "scrolled" : ""}>
        <button className="nav-logo-btn" onClick={goMain}>
          <LDLogo size={54} />
          <span className="nav-logo-text">Layer On Drape</span>
        </button>
        {page==="agent" && agent && (
          <span style={{fontSize:"9px",letterSpacing:".22em",color:"rgba(240,236,228,.3)",textTransform:"uppercase"}}>{agent.regionEn}</span>
        )}
        <a href={MAIN_KAKAO} target="_blank" rel="noopener noreferrer" className="nav-cta">사입 프로그램</a>
      </nav>

      <div className="fade-in" key={page}>
        {page==="main"
          ? <MainPage onAgent={goAgent} onOpenChat={()=>setChatOpen(true)} />
          : <AgentPage agent={agent} onBack={goMain} onAgent={goAgent} />
        }
      </div>

      <AiChat open={chatOpen} onClose={()=>setChatOpen(false)} isMobile={isMobile} />

      {!isMobile && (
        <button
          className={`float-btn ${chatOpen?"chat-open":""}`}
          style={{right: chatOpen?"444px":"28px"}}
          onClick={()=>setChatOpen(v=>!v)}
          title="AI 비서"
        >
          {chatOpen
            ? <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#0a0a0a" strokeWidth="2.5" strokeLinecap="round"/></svg>
            : <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="#0a0a0a" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          }
        </button>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
