<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>L O D — 동대문 새벽시장 전문 사입 서비스</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      *,*:before,*:after{box-sizing:border-box;margin:0;padding:0;}
      html,body{background:#0a0a0a;color:#f0ece4;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;min-height:100%;}

      /* ── 600px 에이블리 컨테이너 ── */
      #root{display:flex;justify-content:center;min-height:100vh;background:#0a0a0a;}
      .shell{width:100%;max-width:600px;min-height:100vh;background:#0a0a0a;position:relative;box-shadow:1px 0 0 rgba(240,236,228,.07),-1px 0 0 rgba(240,236,228,.07);}

      ::-webkit-scrollbar{width:3px;}
      ::-webkit-scrollbar-thumb{background:rgba(240,236,228,.18);border-radius:2px;}

      @keyframes fadeIn {from{opacity:0}to{opacity:1}}
      @keyframes slideUp {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulse   {0%,100%{box-shadow:0 0 0 0 rgba(254,229,0,.55)}60%{box-shadow:0 0 0 18px rgba(254,229,0,0)}}
      @keyframes dotB    {0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
      @keyframes spin    {to{transform:rotate(360deg)}}

      .fade-in{animation:fadeIn .35s ease;}
      .chat-pulse{animation:pulse 2.2s ease-in-out infinite;}
      .chat-pulse:hover{animation-play-state:paused;}
      .float-pulse{animation:pulse 2s ease-in-out infinite;}

      /* NAV */
      .nav{position:sticky;top:0;z-index:200;width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:68px;background:rgba(10,10,10,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(240,236,228,.08);border-radius:0 20px 20px;}

      /* 관리자 배지 */
      .admin-badge{background:#FEE500;color:#0a0a0a;font-size:10px;font-weight:900;padding:3px 10px;border-radius:20px;letter-spacing:.06em;}

      /* 영상 박스 */
      .vbox-outer{display:flex;justify-content:center;width:100%;}
      .vbox{aspect-ratio:9/16;background:#111;border-radius:22px;overflow:hidden;border:1px solid rgba(240,236,228,.12);position:relative;}
      .vbox video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
      .vbox-ph{position:absolute;inset:0;background:linear-gradient(160deg,#1d1d1d,#0d0d0d);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}

      /* 영상 컨트롤 (플레이 바) */
      .vbox-controls{position:absolute;bottom:0;left:0;right:0;padding:20px 15px 15px;background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);display:flex;align-items:center;gap:10px;opacity:0;transition:opacity 0.3s;z-index:5;}
      .vbox:hover .vbox-controls{opacity:1;}
      .play-btn{background:none;border:none;cursor:pointer;color:#fff;display:flex;align-items:center;}
      .seek-bar{flex:1;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;position:relative;cursor:pointer;}
      .seek-fill{height:100%;background:#FEE500;border-radius:2px;width:0%;}
      .vol-btn{background:none;border:none;cursor:pointer;color:#fff;display:flex;align-items:center;}
      .vol-slider{width:60px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;cursor:pointer;position:relative;}
      .vol-fill{height:100%;background:#fff;border-radius:2px;width:100%;}

      /* 업로드 버튼 공통 */
      .upload-btn{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(254,229,0,.93);color:#0a0a0a;border:none;border-radius:20px;padding:7px 16px;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap;z-index:3;letter-spacing:.04em;font-family:inherit;}
      .upload-btn:active{opacity:.8;}

      /* 프로그레스 오버레이 */
      .progress-overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:4;border-radius:inherit;}
      .progress-bar-wrap{width:72%;height:6px;background:rgba(255,255,255,.18);border-radius:3px;overflow:hidden;}
      .progress-bar-fill{height:100%;background:#FEE500;border-radius:3px;transition:width .25s;}

      /* 룩북 카드 */
      .lcard{position:relative;padding-top:177.78%;background:#111;border:1px solid rgba(240,236,228,.1);border-radius:18px;overflow:hidden;cursor:pointer;transition:border-color .3s;}
      .lcard:hover{border-color:rgba(240,236,228,.28);}
      .lcard-inner{position:absolute;inset:0;background:#141414;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:background .3s;}
      .lcard:hover .lcard-inner{background:#1c1c1c;}
      .lcard img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .3s;pointer-events:none;}
      .lcard-info{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;transition:opacity .3s;pointer-events:none;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,transparent 55%);}
      .lcard-info div:first-child{font-size:8px;letter-spacing:.18em;color:rgba(240,236,228,.4);margin-bottom:2px;}
      .lcard-info div:last-child{font-size:11px;font-weight:800;letter-spacing:.04em;color:rgba(240,236,228,.8);}

      /* 지역 버튼 */
      .rbtn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:24px 28px;background:transparent;border:1px solid rgba(240,236,228,.1);border-radius:22px;cursor:pointer;font-family:inherit;transition:all .25s;text-align:left;}
      .rbtn:hover{background:rgba(240,236,228,.04);border-color:rgba(240,236,228,.25);transform:translateY(-2px);}

      /* 편집 힌트 */
      .edit-hint{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;background:#FEE500;color:#0a0a0a;padding:2px 8px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:100;font-weight:900;}
      [title]:hover .edit-hint{opacity:1;}

      /* 편집 모달 */
      .edit-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
      .edit-modal{background:#111;width:100%;max-width:440px;border-radius:28px;padding:32px;border:1px solid rgba(240,236,228,.12);box-shadow:0 24px 60px rgba(0,0,0,.5);animation:slideUp .4s cubic-bezier(0.16,1,0.3,1);}
      .edit-modal h3{font-size:18px;font-weight:900;margin-bottom:20px;letter-spacing:-.02em;}
      .edit-textarea{width:100%;height:160px;background:#0a0a0a;border:1px solid rgba(240,236,228,.15);border-radius:16px;padding:18px;color:#f0ece4;font-family:inherit;font-size:15px;line-height:1.6;resize:none;outline:none;transition:border-color .2s;}
      .edit-textarea:focus{border-color:#FEE500;}
      .edit-save-btn{flex:1;background:#f0ece4;color:#0a0a0a;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:900;cursor:pointer;transition:opacity .2s;}
      .edit-cancel-btn{margin-left:10px;background:transparent;color:rgba(240,236,228,.4);border:none;padding:16px;font-size:14px;cursor:pointer;}
      .saving-indicator{display:flex;align-items:center;gap:8px;font-size:12px;color:#FEE500;margin-top:12px;font-weight:700;}
      .spinner-sm{width:14px;height:14px;border:2px solid rgba(254,229,0,.2);border-top-color:#FEE500;border-radius:50%;animation:spin .8s linear infinite;}

      /* 저장 버튼 플로팅 */
      .global-save-btn{position:fixed;bottom:90px;right:20px;background:#FEE500;color:#0a0a0a;border:none;border-radius:50px;padding:14px 24px;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 8px 24px rgba(254,229,0,0.3);z-index:800;display:flex;align-items:center;gap:8px;transition:all 0.2s;animation:slideUp 0.5s ease;}
      .global-save-btn:hover{transform:scale(1.05);background:#fff;}
      .global-save-btn:active{transform:scale(0.95);}

      /* 챗 */
      .chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:900;display:flex;flex-direction:column;animation:fadeIn .3s ease;}
      .chat-win{flex:1;display:flex;flex-direction:column;max-width:600px;margin:0 auto;width:100%;background:#0d0d0d;}
      .chat-header{padding:20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(240,236,228,.06);}
      .chat-body{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px;}
      .msg{max-width:85%;padding:14px 18px;border-radius:20px;font-size:14px;line-height:1.6;word-break:break-all;}
      .msg.user{align-self:flex-end;background:#f0ece4;color:#0a0a0a;border-bottom-right-radius:4px;font-weight:500;}
      .msg.ai{align-self:flex-start;background:rgba(240,236,228,.06);color:#f0ece4;border-bottom-left-radius:4px;border:1px solid rgba(240,236,228,.08);}
      .chat-footer{padding:16px 20px 32px;border-top:1px solid rgba(240,236,228,.06);display:flex;gap:10px;align-items:center;}
      .chat-input{flex:1;background:rgba(240,236,228,.04);border:1px solid rgba(240,236,228,.1);border-radius:16px;padding:14px 18px;color:#f0ece4;font-family:inherit;font-size:14px;outline:none;transition:all .2s;max-height:120px;resize:none;}
      .chat-input:focus{border-color:rgba(240,236,228,.3);background:rgba(240,236,228,.07);}
      .send-btn{width:48px;height:48px;border-radius:14px;background:#f0ece4;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;}
      .send-btn:disabled{opacity:.2;cursor:default;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
      const {useState,useEffect,useRef,useCallback} = React;

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         🔧 설정값 — 여기만 수정하세요
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      const CLOUDINARY_CLOUD  = "ddjdyn0yj";
      const CLOUDINARY_PRESET = "lod_unsigned";
      const SHEET_ID          = "1CPmke1eFCcKBlKykXJHyu3ngS6eL9l1uZ5JS9964Do4";
      const APPS_SCRIPT_URL   = ""; // Google Apps Script 웹앱 URL (시트 자동 저장용, 아래 안내 참고)
      const MAIN_KAKAO        = "https://open.kakao.com/LOD_MAIN";
      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

      /* 기본값 */
      const DEFAULTS = {
        "홈페이지 제목":  "동대문 새벽시장\n전문 사입 서비스",
        "메인 영상 URL":  "",
        "공지사항":       "",
        "강북팀 이름":    "강북·도봉·노원·중랑",
        "강북팀 소개":    "L O D 서울 강북권 대표 베테랑 팀입니다.\n18년의 숙련된 노하우로 단순 사입 이상의 가치를 제공합니다.\n트렌드와 마켓 정보를 함께 공유해 드립니다.",
        "강북팀 카카오":  "https://open.kakao.com/SEOUL_NORTH",
        "강북팀 마감":    "매일 AM 03:00",
        "인천팀 이름":    "인천·부천",
        "인천팀 소개":    "인천·부천 지역 사입의 최고 전문가 팀입니다.\n20년 경력의 완벽한 픽업과 빠른 피드백을 약속드립니다.\n경기권 로드샵 사장님들의 든든한 파트너가 되겠습니다.",
        "인천팀 카카오":  "https://open.kakao.com/INCHEON_BUCHEON",
        "인천팀 마감":    "매일 AM 02:30",
      };

      const STEPS = ["사입 신청","현장 픽업","지역별 분류","안전 배송"];
      const LOOKS_INIT = [
        {id:1,label:"EDITORIAL 01",style:"MINIMAL CHIC",   url:""},
        {id:2,label:"EDITORIAL 02",style:"OVERFIT STREET", url:""},
        {id:3,label:"EDITORIAL 03",style:"MODERN CLASSIC", url:""},
        {id:4,label:"EDITORIAL 04",style:"URBAN CASUAL",   url:""},
      ];
      const SYS = `당신은 동대문 새벽시장 전문 사입 서비스 'L O D'의 24시간 AI 비서입니다. 사입, 동대문 시장, 패션 트렌드에 대해 친절하고 전문적으로 2-4문장, 한국어로만 답변하세요.`;

      /* ── 관리자 모드 감지 ── */
      const IS_ADMIN = new URLSearchParams(location.search).get("admin") === "true";

      /* ── 구글 시트 → 자동 저장 (Apps Script 필요) ── */
      async function saveToSheet(key, value){
        if(!APPS_SCRIPT_URL) return;
        try{
          await fetch(APPS_SCRIPT_URL, {
            method:"POST",
            mode:"no-cors",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({action:"update", key, value}),
          });
        }catch(e){ console.warn("시트 저장 실패:", e); }
      }

      /* ── Cloudinary 업로드 (안정적, 진행률 포함) ── */
      async function uploadToCloudinary(file, resourceType, onProgress){
        // 파일 크기 검사 (영상 500MB, 이미지 20MB)
        const maxSize = resourceType==="video" ? 500*1024*1024 : 20*1024*1024;
        if(file.size > maxSize){
          const mb = (maxSize/1024/1024).toFixed(0);
          throw new Error(`파일이 너무 큽니다. ${mb}MB 이하 파일을 사용해 주세요.\n현재 파일: ${(file.size/1024/1024).toFixed(1)}MB`);
        }

        return new Promise((resolve, reject)=>{
          const fd = new FormData();
          fd.append("file", file);
          fd.append("upload_preset", CLOUDINARY_PRESET);

          const xhr = new XMLHttpRequest();
          xhr.upload.onprogress = ev=>{
            if(ev.lengthComputable && onProgress)
              onProgress(Math.round(ev.loaded/ev.total*100));
          };
          xhr.onload = ()=>{
            try{
              const res = JSON.parse(xhr.responseText);
              if(res.secure_url) resolve(res.secure_url);
              else reject(new Error("업로드 실패: 서버 오류\n" + (res.error?.message||"")));
            }catch{ reject(new Error("응답 파싱 오류")); }
          };
          xhr.onerror  = ()=> reject(new Error("인터넷 연결을 확인해 주세요."));
          xhr.ontimeout= ()=> reject(new Error("시간 초과. 와이파이에서 다시 시도해 주세요."));
          xhr.timeout  = 5 * 60 * 1000; // 5분
          xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${resourceType}/upload`);
          xhr.send(fd);
        });
      }

      /* ── HOOKS ── */
      function useClock(){
        const [t,setT]=useState(new Date());
        useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id);},[]);
        return t.toLocaleTimeString("ko-KR",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
      }
      function useSheetData(){
        const [data,setData]=useState(DEFAULTS);
        const [loading,setLoading]=useState(false);
        useEffect(()=>{
          if(!SHEET_ID){setData(DEFAULTS);return;}
          setLoading(true);
          const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
          fetch(url).then(r=>r.text()).then(text=>{
            const rows=text.trim().split("\n").slice(1);
            const parsed={...DEFAULTS};
            rows.forEach(row=>{
              const m=row.match(/^"?([^",\r\n]+)"?,?"?([\s\S]*?)"?$/);
              if(m&&m[1]){
                const key=m[1].trim();
                const val=m[2].replace(/\\n/g,"\n").replace(/""/g,'"').trim();
                if(key in parsed) parsed[key]=val;
              }
            });
            setData(parsed);
          }).catch(()=>setData(DEFAULTS)).finally(()=>setLoading(false));
        },[]);
        return {data,setData,loading};
      }

      /* ── LD LOGO ── */
      function LDLogo({size=54,a=1}){
        return(
          <svg width={size} height={size} viewBox="0 0 100 100" fill="none" style={{opacity:a,flexShrink:0}}>
            <circle cx="50" cy="50" r="46" stroke="#f0ece4" strokeWidth="5" fill="none"/>
            <text x="14" y="72" fontFamily="Georgia,serif" fontWeight="900" fontSize="62" fill="#f0ece4" letterSpacing="-2">LD</text>
          </svg>
        );
      }

      /* ── 인라인 편집 모달 ── */
      function EditModal({fieldKey, label, value, onSave, onClose}){
        const [val,setVal]=useState(value);
        const [saving,setSaving]=useState(false);
        const save=async()=>{
          setSaving(true);
          await saveToSheet(fieldKey, val);
          onSave(fieldKey, val);
          setSaving(false);
          onClose();
        };
        return(
          <div className="edit-modal-bg" onClick={onClose}>
            <div className="edit-modal" onClick={e=>e.stopPropagation()}>
              <h3>✏️ {label} 수정</h3>
              <textarea className="edit-textarea" value={val} onChange={e=>setVal(e.target.value)} autoFocus/>
              {saving && <div className="saving-indicator"><div className="spinner-sm"/><span>시트에 저장 중...</span></div>}
              <div style={{marginTop:14,display:"flex",alignItems:"center"}}>
                <button className="edit-save-btn" onClick={save} disabled={saving}>저장</button>
                <button className="edit-cancel-btn" onClick={onClose}>취소</button>
              </div>
              {!APPS_SCRIPT_URL && <div style={{marginTop:10,fontSize:10,color:"rgba(240,236,228,.35)",lineHeight:1.6}}>⚠️ Apps Script 미설정 — 화면에만 적용됩니다. 구글 시트 자동 저장을 원하시면 APPS_SCRIPT_URL을 설정하세요.</div>}
            </div>
          </div>
        );
      }

      /* ── 편집 가능 텍스트 컴포넌트 ── */
      function Editable({fieldKey, label, value, style:sx, className, onEdit, tag:Tag="div"}){
        if(!IS_ADMIN) return <Tag style={sx} className={className}>{value}</Tag>;
        return(
          <Tag style={{...sx,position:"relative"}} className={className}
            onClick={()=>onEdit(fieldKey, label, value)}
            title={`클릭해서 '${label}' 수정`}>
            <span className="edit-hint">✏️ 클릭해서 수정</span>
            {value}
          </Tag>
        );
      }

      /* ── 업로드 박스 공통 ── */
      function UploadOverlay({progress, text}){
        return(
          <div className="progress-overlay">
            <div style={{fontSize:13,color:"#f0ece4",fontWeight:700}}>{text} {progress}%</div>
            <div className="progress-bar-wrap">
              <div className="progress-bar-fill" style={{width:progress+"%"}}/>
            </div>
          </div>
        );
      }

      /* ── 영상 박스 ── */
      function VideoBox({videoUrl, titleRef, sheetKey}){
        const boxRef  = useRef(null);
        const fileRef = useRef(null);
        const videoRef = useRef(null);
        const [src,setSrc]     = useState(videoUrl||"");
        const [prog,setProg]   = useState(0);
        const [uploading,setUploading] = useState(false);
        const [error,setError] = useState("");
        const [isPlaying, setIsPlaying] = useState(true);
        const [progress, setProgress] = useState(0);
        const [volume, setVolume] = useState(0); // 기본 음소거

        useEffect(()=>{ if(videoUrl) setSrc(videoUrl); },[videoUrl]);

        /* 타이틀 폭 맞춤 */
        useEffect(()=>{
          const sync=()=>{
            if(!titleRef?.current||!boxRef.current)return;
            const w=titleRef.current.getBoundingClientRect().width;
            if(w>0) boxRef.current.style.width=w+"px";
          };
          sync();
          const ro=new ResizeObserver(sync);
          if(titleRef?.current) ro.observe(titleRef.current);
          window.addEventListener("resize",sync);
          document.fonts?.ready.then(sync);
          return()=>{ro.disconnect();window.removeEventListener("resize",sync);};
        },[titleRef]);

        const togglePlay = () => {
          if(!videoRef.current) return;
          if(videoRef.current.paused) {
            videoRef.current.play();
            setIsPlaying(true);
          } else {
            videoRef.current.pause();
            setIsPlaying(false);
          }
        };

        const handleTimeUpdate = () => {
          if(!videoRef.current) return;
          const p = (videoRef.current.currentTime / videoRef.current.duration) * 100;
          setProgress(p);
        };

        const handleSeek = (e) => {
          if(!videoRef.current || !boxRef.current) return;
          const rect = e.currentTarget.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const p = x / rect.width;
          videoRef.current.currentTime = p * videoRef.current.duration;
        };

        const handleVolume = (e) => {
          if(!videoRef.current) return;
          const rect = e.currentTarget.getBoundingClientRect();
          const x = e.clientX - rect.left;
          let v = x / rect.width;
          v = Math.max(0, Math.min(1, v));
          videoRef.current.volume = v;
          videoRef.current.muted = (v === 0);
          setVolume(v);
        };

        const handleFile=async(e)=>{
          const file=e.target.files[0]; if(!file)return;
          setError(""); setUploading(true); setProg(0);
          try{
            const url=await uploadToCloudinary(file,"video",setProg);
            setSrc(url);
            await saveToSheet(sheetKey||"메인 영상 URL", url);
            if(!APPS_SCRIPT_URL) alert("✅ 업로드 완료!\n구글 시트에 자동 저장하려면 Apps Script를 설정하세요.\n\n영상 URL:\n"+url);
          }catch(err){
            setError(err.message);
          }finally{ setUploading(false); e.target.value=""; }
        };

        return(
          <div className="vbox-outer">
            <div className="vbox" ref={boxRef}>
              {src
                ?<video ref={videoRef} src={src} autoPlay muted loop playsInline onTimeUpdate={handleTimeUpdate}/>
                :<div className="vbox-ph">
                  <div style={{width:76,height:76,borderRadius:"50%",border:"1px solid rgba(240,236,228,.18)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{width:0,height:0,borderTop:"11px solid transparent",borderBottom:"11px solid transparent",borderLeft:"18px solid rgba(240,236,228,.38)",marginLeft:5}}/>
                  </div>
                  <span style={{fontSize:11,letterSpacing:".34em",color:"rgba(240,236,228,.22)",textTransform:"uppercase"}}>L O D FILM</span>
                </div>
              }
              
              {src && (
                <div className="vbox-controls">
                  <button className="play-btn" onClick={togglePlay}>
                    {isPlaying 
                      ? <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                      : <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    }
                  </button>
                  <div className="seek-bar" onClick={handleSeek}>
                    <div className="seek-fill" style={{width: `${progress}%`}}/>
                  </div>
                  <button className="vol-btn" onClick={() => { if(videoRef.current) { videoRef.current.muted = !videoRef.current.muted; setVolume(videoRef.current.muted ? 0 : videoRef.current.volume); } }}>
                    {volume === 0 
                      ? <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                      : <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    }
                  </button>
                  <div className="vol-slider" onClick={handleVolume}>
                    <div className="vol-fill" style={{width: `${volume * 100}%`}}/>
                  </div>
                </div>
              )}

              {uploading && <UploadOverlay progress={prog} text="업로드 중"/>}
              {IS_ADMIN && !uploading && (
                <button className="upload-btn" onClick={()=>fileRef.current?.click()}>
                  {src?"📁 영상 교체":"📁 영상 업로드"}
                </button>
              )}
            </div>
            <input ref={fileRef} type="file" accept="video/*" style={{display:"none"}} onChange={handleFile}/>
            {error && <div style={{marginTop:10,background:"rgba(255,80,80,.12)",border:"1px solid rgba(255,80,80,.3)",borderRadius:12,padding:"10px 14px",fontSize:12,color:"rgba(255,160,160,.9)",lineHeight:1.6,textAlign:"center",width:"100%"}}>{error}</div>}
          </div>
        );
      }

      /* ── 챗 컴포넌트 ── */
      function Chat({open, onClose}){
        const [msgs,setMsgs]=useState([{role:"ai",content:"안녕하세요! L O D 24시 AI 비서입니다. 무엇을 도와드릴까요?"}]);
        const [input,setInput]=useState("");
        const [loading,setLoading]=useState(false);
        const endRef=useRef(null);

        useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

        const send=async()=>{
          if(!input.trim()||loading)return;
          const userMsg=input.trim();
          setInput("");
          setMsgs(prev=>[...prev,{role:"user",content:userMsg}]);
          setLoading(true);

          try{
            const res=await fetch("https://api.openai.com/v1/chat/completions",{
              method:"POST",
              headers:{"Content-Type":"application/json","Authorization":"Bearer sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"}, // 실제 키 필요
              body:JSON.stringify({
                model:"gpt-4o-mini",
                messages:[{role:"system",content:SYS},...msgs.map(m=>({role:m.role==="ai"?"assistant":"user",content:m.content})),{role:"user",content:userMsg}],
                temperature:0.7
              })
            });
            const d=await res.json();
            const aiVal=d.choices[0].message.content;
            setMsgs(prev=>[...prev,{role:"ai",content:aiVal}]);
          }catch{
            setMsgs(prev=>[...prev,{role:"ai",content:"죄송합니다. 잠시 후 다시 시도해 주세요."}]);
          }finally{setLoading(false);}
        };

        if(!open) return null;
        return(
          <div className="chat-overlay">
            <div className="chat-win">
              <div className="chat-header">
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:10,height:10,background:"#FEE500",borderRadius:"50%",animation:"dotB 1.4s infinite"}}/>

              </div>
              <div className="chat-body">
                {msgs.map((m,i)=>(
                  <div key={i} className={`msg ${m.role}`}>{m.content}</div>
                ))}
                {loading && <div className="msg ai"><div className="spinner-sm"/></div>}
                <div ref={endRef}/>
              </div>
              <div className="chat-footer">
                <textarea className="chat-input" placeholder="사입에 대해 무엇이든 물어보세요..." value={input} onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} rows={1}/>
                <button className="send-btn" onClick={send} disabled={!input.trim()||loading}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" strokeWidth="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
              </div>
            </div>
          </div>
        );
      }

            {IS_ADMIN && (
              <button className="global-save-btn" onClick={saveAllToSheet} disabled={isSavingAll}>
                {isSavingAll ? <div className="spinner-sm"/> : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>}
                {isSavingAll ? "저장 중..." : "전체 변경사항 저장"}
              </button>
            )}

            {modal && <LookModal look={modal} looks={looks} idx={mIdx} onClose={()=>setModal(null)} onPrev={prev} onNext={next}/>}
            {editField && <EditModal fieldKey={editField.key} label={editField.label} value={editField.value} onSave={handleSave} onClose={()=>setEditField(null)}/>}
          </div>
        );
      }

      /* ── AGENT PAGE ── */
      function AgentPage({ag, onBack, onAgent, allAgents}){
        const titleRef = useRef(null);
        useEffect(()=>{window.scrollTo({top:0});},[ag.id]);
        return(
          <div className="fade-in">
            <div style={{padding:"18px 20px 0"}}>
              <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:11,letterSpacing:".26em",color:"rgba(240,236,228,.38)",textTransform:"uppercase",padding:0,fontFamily:"inherit",transition:"color .2s"}}
                onMouseEnter={e=>e.currentTarget.style.color="rgba(240,236,228,.75)"}
                onMouseLeave={e=>e.currentTarget.style.color="rgba(240,236,228,.38)"}>
                <span style={{fontSize:16}}>←</span> Back to L O D
              </button>
            </div>
            <div style={{padding:"16px 20px 0"}}>
              <VideoBox videoUrl={ag.videoUrl||""} titleRef={titleRef} sheetKey={ag.id==="SN"?"강북팀 영상":"인천팀 영상"}/>
            </div>
            <div style={{padding:"16px 20px 0"}}>
              <a href={ag.kakao} target="_blank" rel="noopener noreferrer"
                style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,background:"#f0ece4",color:"#0a0a0a",padding:"18px",fontSize:15,fontWeight:900,textDecoration:"none",textTransform:"uppercase",borderRadius:50,letterSpacing:".1em",transition:"opacity .2s"}}
                onMouseEnter={e=>e.currentTarget.style.opacity=".84"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="#0a0a0a"><path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.56 1.48 4.83 3.74 6.26l-.95 3.54 4.1-2.04c.67.1 1.37.16 2.11.16 4.97 0 9-3.36 9-7.5S16.97 3 12 3z"/></svg>
                카카오톡 사입 문의하기
              </a>
              <div style={{textAlign:"center",fontSize:9,letterSpacing:".18em",color:"rgba(240,236,228,.2)",textTransform:"uppercase",marginTop:8}}>마감 {ag.deadline}</div>
            </div>
            <div style={{padding:"28px 20px",display:"flex",flexDirection:"column",gap:32,textAlign:"center"}}>
              <div>
                <div style={{fontSize:10,letterSpacing:".32em",color:"rgba(240,236,228,.28)",textTransform:"uppercase",marginBottom:12}}>{ag.regionEn}</div>
                <h2 style={{fontSize:"clamp(24px,7.5vw,40px)",fontWeight:900,lineHeight:1.15,marginBottom:10}}>{ag.label}</h2>
              </div>
              <div>
                <div style={{fontSize:14,letterSpacing:".28em",color:"rgba(240,236,228,.26)",textTransform:"uppercase",marginBottom:14}}>Introduction</div>
                {ag.intro.split("\n").map((line,i)=>(
                  <p key={i} style={{fontSize:i===0?"clamp(17px,4.8vw,24px)":"clamp(14px,3.8vw,19px)",lineHeight:1.75,color:i===0?"rgba(240,236,228,.88)":"rgba(240,236,228,.5)",marginBottom:10,wordBreak:"keep-all"}}>{line}</p>
                ))}
              </div>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:14,letterSpacing:".28em",color:"rgba(240,236,228,.26)",textTransform:"uppercase",marginBottom:14,textAlign:"center"}}>사입 안내</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"16px 0",borderBottom:"1px solid rgba(240,236,228,.07)"}}>
                  <span style={{fontSize:18,color:"rgba(240,236,228,.42)"}}>사입 신청 마감</span>
                  <span style={{fontSize:22,fontWeight:900,color:"rgba(240,236,228,.95)"}}>{ag.deadline}</span>
                </div>
              </div>
              <div>
                <div style={{fontSize:14,letterSpacing:".28em",color:"rgba(240,236,228,.26)",textTransform:"uppercase",marginBottom:14}}>다른 지역 담당</div>
                {allAgents.filter(a=>a.id!==ag.id).map(other=>(
                  <button key={other.id} onClick={()=>onAgent(other)}
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"20px 24px",background:"transparent",border:"1px solid rgba(240,236,228,.12)",borderRadius:18,cursor:"pointer",fontFamily:"inherit",marginBottom:10,transition:"all .22s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background="rgba(240,236,228,.06)";e.currentTarget.style.borderColor="rgba(240,236,228,.28)";}}
                    onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="rgba(240,236,228,.12)";}}>
                    <div style={{fontSize:"clamp(16px,4.8vw,22px)",fontWeight:700,color:"rgba(240,236,228,.6)",flex:1,textAlign:"center"}}>{other.label}</div>
                    <span style={{fontSize:"clamp(20px,5.5vw,26px)",color:"rgba(240,236,228,.24)"}}>→</span>
                  </button>
                ))}
              </div>
            </div>
            <div style={{height:36}}/>
          </div>
        );
      }

      /* ── APP ── */
      function App(){
        const [page,setPage]   = useState("main");
        const [ag,setAg]       = useState(null);
        const [chatOpen,setChatOpen] = useState(false);
        const {data} = useSheetData();

        const allAgents = [
          {id:"SN",label:data["강북팀 이름"],kakao:data["강북팀 카카오"],deadline:data["강북팀 마감"],intro:data["강북팀 소개"],regionEn:"SEOUL NORTH AREA"},
          {id:"IB",label:data["인천팀 이름"],kakao:data["인천팀 카카오"],deadline:data["인천팀 마감"],intro:data["인천팀 소개"],regionEn:"INCHEON · BUCHEON"},
        ];

        const goAgent = a => { setAg(a); setPage("agent"); window.scrollTo({top:0}); };
        const goMain  = () => { setPage("main"); setAg(null); };

        return(
          <div className="shell">
            {/* NAV */}
            <div className="nav">
              <button onClick={goMain} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:10}}>
                <LDLogo size={54}/>
                <span style={{fontSize:13,fontWeight:300,color:"rgba(240,236,228,.62)",letterSpacing:".22em",textTransform:"uppercase"}}>Layer On Drape</span>
              </button>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {IS_ADMIN && <span className="admin-badge">관리자</span>}
                <a href={MAIN_KAKAO} target="_blank" rel="noopener noreferrer"
                  style={{background:"#f0ece4",color:"#0a0a0a",padding:"11px 20px",fontSize:13,fontWeight:900,textDecoration:"none",borderRadius:50,whiteSpace:"nowrap",transition:"opacity .2s"}}
                  onMouseEnter={e=>e.currentTarget.style.opacity=".82"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                  사입 프로그램
                </a>
              </div>
            </div>

            {/* PAGE */}
            <div className="fade-in" key={page}>
              {page==="main"
                ?<MainPage onAgent={goAgent} onChat={()=>setChatOpen(true)}/>
                :<AgentPage ag={ag} onBack={goMain} onAgent={goAgent} allAgents={allAgents}/>
              }
            </div>

            <Chat open={chatOpen} onClose={()=>setChatOpen(false)}/>

            {/* 플로팅 챗 버튼 */}
            <div style={{position:"sticky",bottom:0,display:"flex",justifyContent:"flex-end",padding:"0 16px 20px",marginTop:-62,pointerEvents:"none"}}>
              <button onClick={()=>setChatOpen(v=>!v)} className={chatOpen?"":"float-pulse"}
                style={{width:54,height:54,borderRadius:"50%",background:"#FEE500",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(254,229,0,.45)",transition:"transform .2s",pointerEvents:"auto"}}
                onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"}
                onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
                {chatOpen
                  ?<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#0a0a0a" strokeWidth="2.5" strokeLinecap="round"/></svg>
                  :<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="#0a0a0a" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                }
              </button>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
</body>
</html>
