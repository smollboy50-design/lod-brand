<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L O D — 동대문 새벽시장 전문 사입 서비스</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      background:#0a0a0a;
      color:#f0ece4;
      font-family:'Noto Sans KR',sans-serif;
      overflow-x:hidden;
      min-height:100%;
    }
    #root{ display:flex; justify-content:center; min-height:100vh; background:#0a0a0a; }
    .shell{
      width:100%;
      max-width:600px;
      min-height:100vh;
      background:#0a0a0a;
      position:relative;
      box-shadow:1px 0 0 rgba(240,236,228,0.07),-1px 0 0 rgba(240,236,228,0.07);
    }
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:rgba(240,236,228,.18);border-radius:2px;}
    @keyframes fadeIn  {from{opacity:0}to{opacity:1}}
    @keyframes slideUp {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse   {0%,100%{box-shadow:0 0 0 0 rgba(254,229,0,.55)}60%{box-shadow:0 0 0 18px rgba(254,229,0,0)}}
    @keyframes dotB    {0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
    .fade-in{animation:fadeIn .35s ease;}
    .nav{
      position:sticky;top:0;z-index:200;
      width:100%;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;
      height:68px;
      background:rgba(10,10,10,0.96);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(240,236,228,0.08);
      border-radius:0 0 20px 20px;
    }
    .nav-logo{background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:10px;}
    .nav-logo-text{font-size:14px;font-weight:300;color:rgba(240,236,228,.62);letter-spacing:.24em;text-transform:uppercase;}
    .nav-cta{
      background:#f0ece4;color:#0a0a0a;
      padding:11px 22px;font-size:14px;font-weight:900;
      text-decoration:none;border-radius:50px;
      white-space:nowrap;letter-spacing:.04em;
      flex-shrink:0;transition:opacity .2s;
    }
    
    /* ── 9:16 VIDEO BOX — 사장님 지정 400px 황금폭 ── */
    .vbox-wrap{ display:flex; justify-content:center; width:100%; }
    .vbox{
      width:400px; /* 전~스 라인 폭 */
      max-width:95%;
      aspect-ratio:9/16;
      background:#111;
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(240,236,228,.1);
      position:relative;
      flex-shrink:0;
    }
    .vbox video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .vbox-ph{position:absolute;inset:0;background:linear-gradient(160deg,#1d1d1d,#0d0d0d);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
    .vbox-circle{width:80px;height:80px;border-radius:50%;border:1px solid rgba(240,236,228,.18);display:flex;align-items:center;justify-content:center;}
    .vbox-tri{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:20px solid rgba(240,236,228,.38);margin-left:5px;}
    .vbox-label{font-size:11px;letter-spacing:.36em;color:rgba(240,236,228,.2);text-transform:uppercase;}

    /* ── LOOK CARD — 영상 폭에 맞춰 2열 정렬 ── */
    .look-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 400px; /* 영상과 동일한 폭으로 정렬 */
      margin: 24px auto 0;
    }
    .lcard{
      position:relative;
      padding-top:177.78%; /* 9:16 */
      background:#111;
      border:1px solid rgba(240,236,228,.1);
      border-radius:18px;
      overflow:hidden;
      cursor:pointer;
      transition:border-color .3s;
    }
    .lcard-inner{position:absolute;inset:0;background:#141414;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
    .lcard-plus{width:42px;height:42px;border:1px solid rgba(240,236,228,.12);
