<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L O D — 동대문 새벽시장 전문 사입 서비스</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:#0a0a0a;color:#f0ece4;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;min-height:100%;}

    #root{display:flex;justify-content:center;min-height:100vh;background:#0a0a0a;}
    .shell{width:100%;max-width:600px;min-height:100vh;background:#0a0a0a;position:relative;box-shadow:1px 0 0 rgba(240,236,228,.07),-1px 0 0 rgba(240,236,228,.07);}

    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:rgba(240,236,228,.18);border-radius:2px;}

    @keyframes fadeIn  {from{opacity:0}to{opacity:1}}
    @keyframes slideUp {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse   {0%,100%{box-shadow:0 0 0 0 rgba(254,229,0,.55)}60%{box-shadow:0 0 0 18px rgba(254,229,0,0)}}
    @keyframes dotB    {0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
    @keyframes spin    {to{transform:rotate(360deg)}}

    .fade-in{animation:fadeIn .35s ease;}
    .chat-pulse{animation:pulse 2.2s ease-in-out infinite;}
    .chat-pulse:hover{animation-play-state:paused;}
    .float-pulse{animation:pulse 2s ease-in-out infinite;}

    /* NAV */
    .nav{position:sticky;top:0;z-index:200;width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:68px;background:rgba(10,10,10,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(240,236,228,.08);border-radius:0 0 20px 20px;}
    .nav-logo{background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:10px;}
    .nav-logo-text{font-size:13px;font-weight:300;color:rgba(240,236,228,.6);letter-spacing:.22em;text-transform:uppercase;}
    .nav-cta{background:#f0ece4;color:#0a0a0a;padding:11px 22px;font-size:14px;font-weight:900;text-decoration:none;border-radius:50px;white-space:nowrap;letter-spacing:.04em;flex-shrink:0;transition:opacity .2s;}
    .nav-cta:hover{opacity:.82;}

    /* 영상 박스 */
    .vbox-outer{display:flex;justify-content:center;width:100%;}
    .vbox{
      aspect-ratio:9/16;
      background:#111;
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(240,236,228,.12);
      position:relative;
      cursor:pointer;
      /* 가로폭은 JS가 타이틀 측정 후 동적으로 주입 */
    }
    .vbox video,.vbox img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .vbox-ph{position:absolute;inset:0;background:linear-gradient(160deg,#1d1d1d,#0d0d0d);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
    .vbox-circle{width:76px;height:76px;border-radius:50%;border:1px solid rgba(240,236,228,.18);display:flex;align-items:center;justify-content:center;}
    .vbox-tri{width:0;height:0;border-top:11px solid transparent;border-bottom:11px solid transparent;border-left:19px solid rgba(240,236,228,.38);margin-left:5px;}
    .vbox-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.2em;color:rgba(240,236,228,.28);text-transform:uppercase;}
    .vbox-upload-badge{position:absolute;top:12px;right:12px;background:rgba(254,229,0,.9);color:#0a0a0a;font-size:10px;font-weight:900;padding:4px 10px;border-radius:20px;letter-spacing:.06em;}

    /* 9:16 LOOK CARD */
    .lcard{position:relative;padding-top:177.78%;background:#111;border:1px solid rgba(240,236,228,.1);border-radius:18px;overflow:hidden;cursor:pointer;transition:border-color .3s;}
    .lcard:hover{border-color:rgba(240,236,228,.3);}
    .lcard-inner{position:absolute;inset:0;background:#141414;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:background .3s;}
    .lcard:hover .lcard-inner{background:#1c1c1c;}
    .lcard-plus{width:42px;height:42px;border:1px solid rgba(240,236,228,.12);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(240,236,228,.18);}
    .lcard-num{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:rgba(240,236,228,.2);}
    .lcard-info{position:absolute;bottom:0;left:0;right:0;padding:12px;opacity:0;transition:opacity .3s;pointer-events:none;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,transparent 55%);}
    .lcard:hover .lcard-info{opacity:1;}
    .lcard-style{font-size:11px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:rgba(240,236,228,.9);}
    .lcard-badge{position:absolute;top:10px;left:10px;font-size:9px;letter-spacing:.2em;color:rgba(240,236,228,.22);}

    /* 지역 버튼 */
    .rbtn{display:flex;align-items:center;justify-content:space-between;width:100%;border:none;border-radius:20px;cursor:pointer;font-family:inherit;transition:transform .2s,filter .2s;padding:26px 28px;background:#FEE500;}
    .rbtn:hover{transform:scale(1.01);filter:brightness(1.06);}

    /* 로딩 스피너 */
    .spinner{width:36px;height:36px;border:3px solid rgba(240,236,228,.15);border-top-color:#f0ece4;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}

    /* 시트 설정 배너 */
    .sheet-banner{background:rgba(254,229,0,.1);border:1px solid rgba(254,229,0,.3);border-radius:16px;padding:16px 18px;margin:16px 20px 0;font-size:13px;line-height:1.7;color:rgba(240,236,228,.75);}
    .sheet-banner strong{color:#FEE500;}
    .sheet-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(240,236,228,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#f0ece4;font-family:inherit;outline:none;margin-top:10px;}
    .sheet-input::placeholder{color:rgba(240,236,228,.3);}
    .sheet-btn{background:#FEE500;color:#0a0a0a;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:900;cursor:pointer;margin-top:8px;width:100%;font-family:inherit;transition:opacity .2s;}
    .sheet-btn:hover{opacity:.85;}

    /* 스텝 스크롤 */
    .steps-row{display:flex;align-items:center;overflow-x:auto;padding-bottom:2px;justify-content:center;}
    .steps-row::-webkit-scrollbar{display:none;}

    textarea::placeholder{color:rgba(240,236,228,.3);}
    textarea{outline:none;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   구글 시트 설정
   ▶ 사용법:
   1. 구글 시트 만들기
   2. 파일 > 공유 > 링크가 있는 모든 사용자 '뷰어' 설정
   3. 아래 SHEET_ID 에 본인 시트 ID 붙여넣기
      (URL에서 /d/XXXXXX/edit 의 XXXXXX 부분)
   4. 시트 첫 행(헤더): 항목명 | 내용
      예시 행 구조:
      홈페이지 제목     | 동대문 새벽시장 전문 사입 서비스
      메인 영상 URL     | https://...mp4
      공지사항          | 오늘 사입 마감 AM 3시!
      강북팀 이름       | HOON 삼촌
      강북팀 소개       | 18년 경력 베테랑입니다.
      인천팀 이름       | JUNE 삼촌
      인천팀 소개       | 20년 경력 베테랑입니다.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const DEFAULT_SHEET_ID = ""; // ← 여기에 시트 ID 입력

/* ── 기본값 (시트 미연동 시 사용) ─────────────── */
const DEFAULTS = {
  "홈페이지 제목":    "동대문 새벽시장\n전문 사입 서비스",
  "메인 영상 URL":    "",
  "공지사항":         "",
  "강북팀 이름":      "강북·도봉·노원·중랑",
  "강북팀 소개":      "L O D 서울 강북권 대표 베테랑 팀입니다.\n18년의 숙련된 노하우로 단순 사입 이상의 가치를 제공합니다.\n트렌드와 마켓 정보를 함께 공유해 드립니다.",
  "강북팀 카카오":    "https://open.kakao.com/SEOUL_NORTH",
  "강북팀 마감":      "매일 AM 03:00",
  "인천팀 이름":      "인천·부천",
  "인천팀 소개":      "인천·부천 지역 사입의 최고 전문가 팀입니다.\n20년 경력의 완벽한 픽업과 빠른 피드백을 약속드립니다.\n경기권 로드샵 사장님들의 든든한 파트너가 되겠습니다.",
  "인천팀 카카오":    "https://open.kakao.com/INCHEON_BUCHEON",
  "인천팀 마감":      "매일 AM 02:30",
  "메인 카카오":      "https://open.kakao.com/LOD_MAIN",
};

const STEPS = ["사입 신청","현장 픽업","지역별 분류","안전 배송"];
const LOOKS = [
  {id:1,label:"EDITORIAL 01",style:"MINIMAL CHIC"},
  {id:2,label:"EDITORIAL 02",style:"OVERFIT STREET"},
  {id:3,label:"EDITORIAL 03",style:"MODERN CLASSIC"},
  {id:4,label:"EDITORIAL 04",style:"URBAN CASUAL"},
];
const SYS = `당신은 동대문 새벽시장 전문 사입 서비스 'L O D'의 24시간 AI 비서입니다. 사입 서비스, 동대문 시장, 패션 트렌드에 대해 친절하고 전문적으로 답변하세요. 2-4문장으로 한국어로만 답변하세요.`;

/* ── HOOKS ─────────────────────────────────────── */
function useClock(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id);},[]);
  return t.toLocaleTimeString("ko-KR",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

/* 구글 시트 데이터 로드 훅 */
function useSheetData(sheetId){
  const [data,setData]=useState(DEFAULTS);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);

  const load = useCallback(async(id)=>{
    if(!id){setData(DEFAULTS);return;}
    setLoading(true);setError(null);
    try{
      // Google Sheets CSV export URL
      const url=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
      const res=await fetch(url);
      if(!res.ok)throw new Error("시트를 불러올 수 없습니다.");
      const text=await res.text();
      // CSV 파싱: "항목명","내용" 형태
      const rows=text.trim().split("\n").slice(1); // 헤더 제외
      const parsed={...DEFAULTS};
      rows.forEach(row=>{
        // CSV 따옴표 처리
        const m=row.match(/^"?([^",]+)"?,?"?(.+?)"?$/);
        if(m&&m[1]&&m[2]){
          const key=m[1].trim();
          const val=m[2].replace(/\\n/g,"\n").replace(/""/g,'"').trim();
          if(key in parsed)parsed[key]=val;
        }
      });
      setData(parsed);
    }catch(e){
      setError("⚠️ 시트 로드 실패: "+e.message);
      setData(DEFAULTS);
    }
    setLoading(false);
  },[]);

  useEffect(()=>{load(sheetId);},[sheetId]);

  return {data,loading,error,reload:()=>load(sheetId)};
}

/* ── LD LOGO ────────────────────────────────────── */
function LDLogo({size=54,a=1}){
  return(
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" style={{opacity:a,flexShrink:0}}>
      <circle cx="50" cy="50" r="46" stroke="#f0ece4" strokeWidth="5" fill="none"/>
      <text x="14" y="72" fontFamily="Georgia,serif" fontWeight="900" fontSize="62" fill="#f0ece4" letterSpacing="-2">LD</text>
    </svg>
  );
}

/* ── 영상 박스 (타이틀 폭 자동 맞춤 + 하이브리드 업로드) ── */
function VideoBox({videoUrl, titleRef}){
  const boxRef   = useRef(null);
  const fileRef  = useRef(null);
  const [localSrc, setLocalSrc] = useState(null); // 임시 로컬 파일

  /* 타이틀 폭 측정 → 영상 박스 가로폭 동기화 */
  useEffect(()=>{
    const sync=()=>{
      if(!titleRef?.current||!boxRef.current)return;
      const w=titleRef.current.getBoundingClientRect().width;
      if(w>0)boxRef.current.style.width=w+"px";
    };
    sync();
    const ro=new ResizeObserver(sync);
    if(titleRef?.current)ro.observe(titleRef.current);
    window.addEventListener("resize",sync);
    if(document.fonts)document.fonts.ready.then(sync);
    return()=>{ro.disconnect();window.removeEventListener("resize",sync);};
  },[titleRef]);

  /* 클릭 → 파일 선택 → 임시 재생 */
  const handleClick=()=>fileRef.current?.click();
  const handleFile=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const url=URL.createObjectURL(f);
    setLocalSrc(url);
  };

  const src = localSrc || videoUrl || null;

  return(
    <div className="vbox-outer">
      <div className="vbox" ref={boxRef} onClick={handleClick} title="클릭하면 영상을 임시 선택할 수 있어요">
        {src
          ? <video src={src} autoPlay muted loop playsInline/>
          : <div className="vbox-ph">
              <div className="vbox-circle"><div className="vbox-tri"/></div>
              <span style={{fontSize:11,letterSpacing:".3em",color:"rgba(240,236,228,.22)",textTransform:"uppercase"}}>L O D FILM</span>
            </div>
        }
        {localSrc && <div className="vbox-upload-badge">📁 임시 영상</div>}
        <div className="vbox-hint">
          {localSrc ? "다시 클릭하면 영상 교체" : "클릭해서 영상 임시 선택"}
        </div>
      </div>
      {/* 숨겨진 파일 입력 */}
      <input ref={fileRef} type="file" accept="video/*,image/*" style={{display:"none"}} onChange={handleFile}/>
    </div>
  );
}

/* ── LOOK MODAL ──────────────────────────────────── */
function Modal({look,idx,total,onClose,onPrev,onNext}){
  useEffect(()=>{
    const fn=e=>{if(e.key==="Escape")onClose();if(e.key==="ArrowLeft")onPrev();if(e.key==="ArrowRight")onNext();};
    window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);
  },[]);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:800,background:"rgba(4,4,4,.97)",backdropFilter:"blur(16px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeIn .2s ease"}}>
      <button onClick={onClose} style={{position:"fixed",top:16,right:16,width:42,height:42,borderRadius:"50%",border:"1px solid rgba(240,236,228,.25)",background:"transparent",color:"rgba(240,236,228,.6)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:810}}>×</button>
      {idx>0&&<button onClick={e=>{e.stopPropagation();onPrev();}} style={{position:"fixed",left:10,top:"50%",transform:"translateY(-50%)",width:40,height:40,borderRadius:"50%",border:"1px solid rgba(240,236,228,.2)",background:"transparent",color:"rgba(240,236,228,.55)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:810}}>‹</button>}
      {idx<total-1&&<button onClick={e=>{e.stopPropagation();onNext();}} style={{position:"fixed",right:10,top:"50%",transform:"translateY(-50%)",width:40,height:40,borderRadius:"50%",border:"1px solid rgba(240,236,228,.2)",background:"transparent",color:"rgba(240,236,228,.55)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:810}}>›</button>}
      <div onClick={e=>e.stopPropagation()} style={{width:"min(280px,70vw)",display:"flex",flexDirection:"column",gap:12,animation:"slideUp .25s ease"}}>
        <div style={{paddingTop:"177.78%",position:"relative",borderRadius:22,border:"1px solid rgba(240,236,228,.12)",overflow:"hidden",background:"#181818"}}>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
            <div style={{fontSize:22,fontWeight:900,letterSpacing:".1em",color:"rgba(240,236,228,.15)"}}>{look.label}</div>
            <div style={{fontSize:9,letterSpacing:".24em",color:"rgba(240,236,228,.1)"}}>AI MODEL · L O D</div>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",padding:"0 2px"}}>
          <div>
            <div style={{fontSize:12,fontWeight:900,letterSpacing:".18em",textTransform:"uppercase",color:"rgba(240,236,228,.75)"}}>{look.style}</div>
            <div style={{fontSize:9,letterSpacing:".12em",color:"rgba(240,236,228,.3)",marginTop:2}}>{look.label}</div>
          </div>
          <div style={{fontSize:10,color:"rgba(240,236,228,.22)"}}>{idx+1}/{total}</div>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:5}}>
          {LOOKS.map((_,i)=><div key={i} style={{height:5,borderRadius:3,cursor:"pointer",transition:"all .25s",width:i===idx?"18px":"5px",background:i===idx?"rgba(240,236,228,.65)":"rgba(240,236,228,.18)"}}/>)}
        </div>
      </div>
    </div>
  );
}

/* ── AI CHAT ──────────────────────────────────────── */
function Chat({open,onClose}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"안녕하세요! L O D AI 비서입니다 😊\n사입에 대해 궁금한 것을 무엇이든 물어보세요!"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const botRef=useRef(null);
  const inpRef=useRef(null);

  useEffect(()=>{
    if(open){setTimeout(()=>botRef.current?.scrollIntoView({behavior:"smooth"}),100);setTimeout(()=>inpRef.current?.focus(),320);}
  },[open,msgs.length]);

  const send=async()=>{
    const t=input.trim();if(!t||loading)return;
    const nm=[...msgs,{role:"user",content:t}];
    setMsgs(nm);setInput("");setLoading(true);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYS,messages:nm.map(m=>({role:m.role,content:m.content}))})});
      const d=await r.json();
      setMsgs(p=>[...p,{role:"assistant",content:d.content?.[0]?.text||"죄송합니다, 잠시 후 다시 시도해 주세요."}]);
    }catch{setMsgs(p=>[...p,{role:"assistant",content:"연결에 문제가 생겼어요. 잠시 후 다시 시도해 주세요."}]);}
    setLoading(false);
  };
  const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};

  return(
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:899,background:"rgba(0,0,0,.6)",backdropFilter:"blur(4px)",opacity:open?1:0,pointerEvents:open?"auto":"none",transition:"opacity .35s"}}/>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:`translateX(-50%) translateY(${open?"0":"100%"})`,width:"100%",maxWidth:600,zIndex:900,height:"80vh",background:"#111",borderRadius:"24px 24px 0 0",border:"1px solid rgba(240,236,228,.15)",display:"flex",flexDirection:"column",boxShadow:"0 -8px 48px rgba(0,0,0,.7)",transition:"transform .4s cubic-bezier(.32,.72,0,1)"}}>

      <div style={{position:"sticky",bottom:0,display:"flex",justifyContent:"flex-end",padding:"0 16px 20px",marginTop:-62,pointerEvents:"none"}}>
        <button onClick={()=>setChatOpen(v=>!v)} className={chatOpen?"":"float-pulse"}
          style={{width:54,height:54,borderRadius:"50%",background:"#FEE500",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(254,229,0,.45)",transition:"transform .2s",pointerEvents:"auto"}}
          onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"}
          onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
          {chatOpen
            ?<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#0a0a0a" strokeWidth="2.5" strokeLinecap="round"/></svg>
            :<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="#0a0a0a" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          }
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
